<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Banner — uses the kiesen.png group shot */
  .banner { width: 100%; max-width: 100%; height: 220px; background-image: url('kiesen.png'); background-size: cover; background-position: center top; background-color: #b9d4e3; position: relative; margin-bottom: 1.5rem; overflow: hidden; }

  .picker-intro { text-align: center; font-size: 15px; color: #555; margin-bottom: 1.25rem; line-height: 1.5; font-family: Arial, sans-serif; }
  .section-list { display: flex; flex-direction: column; gap: 10px; }
  .section-card { background: #fff; border: 1px solid #d8cfc2; border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; text-align: left; width: 100%; font-family: Arial, sans-serif; transition: background 0.15s, border-color 0.15s, transform 0.1s; display: flex; align-items: center; gap: 14px; }
  .section-card:hover { background: #faf6f0; border-color: #8a5e3d; }
  .section-card:active { transform: translateY(1px); }
  .section-icon { font-size: 28px; line-height: 1; }
  .section-card-body { flex: 1; }
  .section-card-title { font-size: 17px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .section-card-desc { font-size: 13px; color: #888; line-height: 1.4; }

  /* Quiz screen */
  .section-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #8a5e3d; margin-bottom: 6px; font-family: Arial, sans-serif; }
  .section-title { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; font-family: Arial, sans-serif; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0 1.5rem; }
  .progress-bar { flex: 1; height: 4px; background: #e3d9c9; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #8a5e3d; border-radius: 2px; transition: width 0.3s ease; }
  .progress-text { font-size: 13px; color: #8a5e3d; white-space: nowrap; font-family: Arial, sans-serif; }

  /* Question card */
  .question-card { background: #fff; border: 1px solid #d8cfc2; border-radius: 14px; padding: 1.5rem 1.75rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(138,94,61,0.08); }
  .question-text { font-size: 20px; font-weight: 600; color: #1a1a1a; line-height: 1.4; margin-bottom: 1.25rem; font-family: Arial, sans-serif; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: center; gap: 14px; padding: 13px 18px; border: 2px solid #d8cfc2; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 500; color: #1a1a1a; background: #fff; text-align: left; width: 100%; transition: background 0.15s, border-color 0.15s; font-family: Arial, sans-serif; line-height: 1.4; }
  .option:hover:not(:disabled) { background: #faf6f0; border-color: #8a5e3d; }
  .option.correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
  .option.wrong { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }
  .option.opinion { background: #F5EEE3; border-color: #B89060; color: #5C3D1A; }
  .option:disabled { cursor: default; }
  .letter { font-size: 14px; font-weight: 700; color: #8a5e3d; min-width: 20px; }
  .option.correct .letter { color: #3B6D11; }
  .option.wrong .letter { color: #A32D2D; }
  .option.opinion .letter { color: #7A5418; }

  .feedback { font-size: 14px; margin-top: 12px; padding: 11px 14px; border-radius: 10px; font-family: Arial, sans-serif; line-height: 1.5; }
  .feedback.correct { background: #EAF3DE; color: #27500A; }
  .feedback.wrong { background: #FCEBEB; color: #791F1F; }
  .feedback.opinion { background: #F5EEE3; color: #5C3D1A; }
  .feedback.hidden { display: none; }

  /* Action row keeps Next button inside the card and visible without scrolling */
  .action-row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 12px; }
  .next-btn { padding: 11px 24px; border: 1px solid #8a5e3d; border-radius: 8px; background: #8a5e3d; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s, opacity 0.3s; display: none; }

/* ============== STATE ============== */
let currentSection = null;
let current = 0;
let score = 0;
let answered = false;

/* ============== SHUFFLE HELPERS ============== */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleQuestionOptions(question) {
  const indices = shuffle(question.options.map(function(_, i) { return i; }));
  const newOptions = indices.map(function(i) { return question.options[i]; });
  const newQuestion = {
    q: question.q,
    options: newOptions,
    feedback: question.feedback
  };
  if (typeof question.answer === 'number') {
    newQuestion.answer = indices.indexOf(question.answer);
  }
  return newQuestion;
}

function prepareSection(section) {
  const shuffledQs = shuffle(section.questions);
  section._questions = shuffledQs.map(shuffleQuestionOptions);
}

/* ============== PICKER ============== */
function renderPicker() {
  document.getElementById('banner').style.display = 'block';
  document.getElementById('picker').style.display = 'block';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  window.scrollTo(0, 0);

  const list = document.getElementById('section-list');
  list.innerHTML = '';
  sections.forEach(function(s) {
    const card = document.createElement('button');
    card.className = 'section-card';
    card.innerHTML =
      '<span class="section-icon">' + s.icon + '</span>' +
      '<span class="section-card-body">' +
        '<div class="section-card-title">' + s.title + '</div>' +
        '<div class="section-card-desc">' + s.desc + '</div>' +
      '</span>';
    card.onclick = function() { startSection(s); };
    list.appendChild(card);
  });
}

/* ============== START / RENDER ============== */
function startSection(s) {
  currentSection = s;
  current = 0;
  score = 0;
  answered = false;
  prepareSection(s);

  document.getElementById('banner').style.display = 'none';
  document.getElementById('picker').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('quiz-section-label').textContent = s.isOpinion ? 'OPINION ROUND' : 'PART ' + s.id;
  document.getElementById('quiz-section-title').textContent = s.title;
  document.getElementById('skip-btn').style.display = currentSection.isOpinion ? 'inline-block' : 'none';

  renderQuestion();
  window.scrollTo(0, 0);
}

function renderQuestion() {
  answered = false;
  const qs = currentSection._questions;
  const q = qs[current];

  document.getElementById('progress-fill').style.width = (((current) / qs.length) * 100) + '%';
  document.getElementById('progress-text').textContent = (current + 1) + ' of ' + qs.length;

  document.getElementById('question-text').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach(function(opt, i) {
    const b = document.createElement('button');
    b.className = 'option';
    const letter = String.fromCharCode(65 + i);
    b.innerHTML = '<span class="letter">' + letter + '</span><span>' + opt + '</span>';
    b.onclick = function() { selectAnswer(i, b); };
    opts.appendChild(b);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback hidden';
  fb.textContent = '';

  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('next-btn').textContent = (current === qs.length - 1) ? 'See result' : 'Next question';
  document.getElementById('skip-btn').style.display = currentSection.isOpinion ? 'inline-block' : 'none';
}

/* ============== ANSWER ============== */
function selectAnswer(i, btn) {
  if (answered) return;
  answered = true;
  const q = currentSection._questions[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(function(o) { o.disabled = true; });

  if (currentSection.isOpinion) {
    btn.classList.add('opinion');
    const fb = document.getElementById('feedback');
    fb.className = 'feedback opinion';
    fb.textContent = q.feedback;
  } else {
    if (i === q.answer) {
      btn.classList.add('correct');
      score++;
      const fb = document.getElementById('feedback');
      fb.className = 'feedback correct';
      fb.textContent = "Correct! " + q.feedback;
    } else {
      btn.classList.add('wrong');
      opts[q.answer].classList.add('correct');
      const fb = document.getElementById('feedback');
      fb.className = 'feedback wrong';
      fb.textContent = "Not quite. " + q.feedback;
    }
  }

  document.getElementById('skip-btn').style.display = 'none';
  document.getElementById('next-btn').classList.add('visible');
}

function skipQuestion() {
  // Only available in opinion round
  if (answered) return;
  nextQuestion();
}

function nextQuestion() {
  current++;
  const qs = currentSection._questions;
  if (current >= qs.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

/* ============== RESULT ============== */
function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  window.scrollTo(0, 0);

  const qs = currentSection._questions;
  if (currentSection.isOpinion) {
    document.getElementById('result-score').textContent = '✓';
    document.getElementById('result-label').textContent = 'Opinion round complete';
    document.getElementById('result-msg').textContent = "Thanks for sharing your thoughts! There were no wrong answers — just your view of the story.";
  } else {
    document.getElementById('result-score').textContent = score;
    document.getElementById('result-label').textContent = 'out of ' + qs.length;
    let msg = '';
    const pct = score / qs.length;
    if (pct === 1) msg = "Perfect score! You're a true Jujutsu Sorcerer.";
    else if (pct >= 0.8) msg = "Excellent! Special grade level knowledge.";
    else if (pct >= 0.6) msg = "Solid work — Grade 1 sorcerer material.";
    else if (pct >= 0.4) msg = "A respectable effort. Maybe rewatch a few episodes!";
    else msg = "A first-year's start. Time to head back to Jujutsu High!";
    document.getElementById('result-msg').textContent = msg;
  }
}

function restartCurrent() {
  if (!currentSection) return renderPicker();
  startSection(currentSection);
}

function goHome() {
  currentSection = null;
  current = 0;
  score = 0;
  answered = false;
  renderPicker();
}

renderPicker();
</script>
</body>
</html>
