<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1923;
    --card: #1a2535;
    --gold: #f0c040;
    --gold2: #ffd770;
    --text: #e8e8e8;
    --muted: #7a8a9a;
    --b1color: #4ab8a0;
    --b2color: #7b8fd4;
    --border: #2a3545;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--gold);
    letter-spacing: 1px;
  }

  header p {
    color: var(--muted);
    margin-top: 6px;
    font-size: 0.95rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 620px;
  }

  .level-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .level-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .level-btn.active-b1 {
    border-color: var(--b1color);
    color: var(--b1color);
    background: rgba(74,184,160,0.1);
  }

  .level-btn.active-b2 {
    border-color: var(--b2color);
    color: var(--b2color);
    background: rgba(123,143,212,0.1);
  }

  .input-row {
    display: flex;
    gap: 12px;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 18px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
  }

  button#lookupBtn {
    padding: 14px 24px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  button#lookupBtn:hover { background: var(--gold2); }
  button#lookupBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-box {
    margin-top: 28px;
    display: none;
  }

  .word-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .level-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .tag-b1 { background: rgba(74,184,160,0.15); color: var(--b1color); }
  .tag-b2 { background: rgba(123,143,212,0.15); color: var(--b2color); }

  .section {
    margin-bottom: 20px;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .section-content {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
  }

  .example-sentence {
    font-style: italic;
    color: #c0ccd8;
    border-left: 3px solid var(--gold);
    padding-left: 14px;
  }

  .uzbek-text {
    color: #a0c8b0;
    font-size: 1.2rem;
  }

  .status {
    margin-top: 20px;
    font-size: 0.9rem;
    color: var(--muted);
    text-align: center;
    min-height: 24px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-box.visible {
    display: block;
    animation: fadeIn 0.3s ease;
  }
</style>
</head>
<body>

<header>
  <h1>📖 Vocabulary Helper</h1>
  <p>Type any English word to get a clear definition and example</p>
</header>

<div class="card">

  <div class="level-row">
    <button class="level-btn active-b1" id="btnB1" onclick="setLevel('B1')">Grade 6 — B1</button>
    <button class="level-btn" id="btnB2" onclick="setLevel('B2')">Grade 8 — B2</button>
  </div>

  <div class="input-row">
    <input type="text" id="wordInput" placeholder="e.g. abundant" onkeydown="if(event.key==='Enter') lookupWord()" />
    <button id="lookupBtn" onclick="lookupWord()">Look up</button>
  </div>

  <div class="status" id="status"></div>

  <div class="result-box" id="resultBox">
    <hr class="divider">
    <div class="word-title" id="wordTitle"></div>
    <span class="level-tag" id="levelTag"></span>

    <div class="section">
      <div class="section-label">Definition</div>
      <div class="section-content" id="definition"></div>
    </div>

    <div class="section">
      <div class="section-label">Example Sentence</div>
      <div class="section-content example-sentence" id="example"></div>
    </div>

    <div class="section">
      <div class="section-label">Uzbek Translation</div>
      <div class="section-content uzbek-text" id="uzbek"></div>
    </div>
  </div>

</div>

<script>
  let currentLevel = "B1";

  function setLevel(level) {
    currentLevel = level;
    document.getElementById("btnB1").className = "level-btn" + (level === "B1" ? " active-b1" : "");
    document.getElementById("btnB2").className = "level-btn" + (level === "B2" ? " active-b2" : "");
  }

  async function lookupWord() {
    const word = document.getElementById("wordInput").value.trim();
    if (!word) return;

    const btn = document.getElementById("lookupBtn");
    const status = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");

    btn.disabled = true;
    status.textContent = "⏳ Looking up \"" + word + "\"...";
    resultBox.classList.remove("visible");

    const levelDesc = currentLevel === "B1"
      ? "B1 level (simple, concrete language for 12-year-old EFL learners)"
      : "B2 level (more complex vocabulary suitable for 14-year-old EFL learners)";

    const prompt = `You are an EFL vocabulary assistant. A student has looked up the word: "${word}"

Provide the following at ${levelDesc}. Respond ONLY in this exact JSON format with no extra text:

{
  "word": "${word}",
  "definition": "A clear, simple definition appropriate for the level",
  "example": "A natural example sentence using the word",
  "uzbek": "The Uzbek translation of the word in Latin script (not Cyrillic)"
}`;

    try {
      const res = await fetch("https://claude-proxy-zeta-six.vercel.app/api/proxy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 400,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content[0].text.trim();
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      document.getElementById("wordTitle").textContent = parsed.word;
      document.getElementById("definition").textContent = parsed.definition;
      document.getElementById("example").textContent = parsed.example;
      document.getElementById("uzbek").textContent = parsed.uzbek;

      const tag = document.getElementById("levelTag");
      tag.textContent = currentLevel;
      tag.className = "level-tag " + (currentLevel === "B1" ? "tag-b1" : "tag-b2");

      resultBox.classList.add("visible");
      status.textContent = "";

    } catch (err) {
      status.textContent = "❌ Error: " + err.message;
    }

    btn.disabled = false;
  }
</script>

</body>
</html>
