<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --card: #ffffff;
    --border: #ddd8cc;
    --text: #2a2520;
    --muted: #8a8278;
    --accent: #3d6b4f;
    --accent-light: #e8f0eb;
    --early: #4a6fa5;
    --early-light: #e8eef5;
    --mid: #8b5e3c;
    --mid-light: #f5ede5;
    --late: #6b4a8b;
    --late-light: #f0ebf5;
    --save-ok: #3d6b4f;
    --save-err: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  /* ── HEADER ── */
  header {
    background: var(--text);
    color: #fff;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: space-between;
  }
  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #status-pill {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  /* ── WEEK NAV ── */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 1.5rem 2rem 0.5rem;
  }
  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--accent-light); }
  .week-label {
    text-align: center;
    min-width: 220px;
  }
  .week-label .wk-range {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .week-label .wk-title {
    font-size: 1.2rem;
    font-weight: 500;
    margin-top: 2px;
  }
  .this-week-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    margin-top: 4px;
    display: inline-block;
    transition: background 0.15s;
  }
  .this-week-btn:hover { background: var(--accent-light); }

  /* ── SLOTS ── */
  .slots {
    max-width: 700px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .slot-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .slot-card:focus-within {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .slot-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .slot-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .slot-time {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .slot-saving {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .slot-saving.visible { opacity: 1; }

  /* colour themes per slot */
  .slot-6g .slot-header { background: var(--early-light); }
  .slot-6g .slot-badge { background: var(--early); color: #fff; }

  .slot-8b .slot-header { background: var(--mid-light); }
  .slot-8b .slot-badge { background: var(--mid); color: #fff; }

  .slot-8g .slot-header { background: var(--late-light); }
  .slot-8g .slot-badge { background: var(--late); color: #fff; }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
    background: transparent;
    min-height: 110px;
  }
  textarea::placeholder { color: var(--border); }

  /* ── SETUP NOTICE ── */
  #setup-notice {
    max-width: 700px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
    display: none;
  }
  .notice-card {
    background: #fff8e8;
    border: 1px solid #e8d08a;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }
  .notice-card h3 {
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
    color: #7a5c00;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .notice-card p {
    font-size: 0.85rem;
    color: #7a5c00;
    line-height: 1.6;
  }
  .notice-card code {
    background: rgba(0,0,0,0.07);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
  }
</style>
</head>
<body>

<header>
  <h1>Weekly Planner</h1>
  <span id="status-pill">connecting…</span>
</header>

<div class="week-nav">
  <button class="nav-btn" id="prev-btn" title="Previous week">&#8592;</button>
  <div class="week-label">
    <div class="wk-range" id="wk-range">—</div>
    <div class="wk-title" id="wk-title">—</div>
    <button class="this-week-btn" id="today-btn">This week</button>
  </div>
  <button class="nav-btn" id="next-btn" title="Next week">&#8594;</button>
</div>

<div id="setup-notice">
  <div class="notice-card">
    <h3>Setup needed</h3>
    <p>Open this file in Notepad and replace <code>YOUR_APPS_SCRIPT_URL_HERE</code> with your deployed Apps Script URL. See the setup instructions file.</p>
  </div>
</div>

<div class="slots">
  <div class="slot-card slot-6g">
    <div class="slot-header">
      <span class="slot-badge">6G</span>
      <span class="slot-time">Morning</span>
      <span class="slot-saving" id="save-6g">saving…</span>
    </div>
    <textarea id="ta-6g" placeholder="Plans, ideas, activities for 6G this week…"></textarea>
  </div>

  <div class="slot-card slot-8b">
    <div class="slot-header">
      <span class="slot-badge">8B</span>
      <span class="slot-time">Mid-morning</span>
      <span class="slot-saving" id="save-8b">saving…</span>
    </div>
    <textarea id="ta-8b" placeholder="Plans, ideas, activities for 8B this week…"></textarea>
  </div>

  <div class="slot-card slot-8g">
    <div class="slot-header">
      <span class="slot-badge">8G</span>
      <span class="slot-time">Afternoon</span>
      <span class="slot-saving" id="save-8g">saving…</span>
    </div>
    <textarea id="ta-8g" placeholder="Plans, ideas, activities for 8G this week…"></textarea>
  </div>
</div>

<script>
// ── CONFIG ── replace this with your deployed Apps Script URL
const SCRIPT_URL = https://script.google.com/macros/s/AKfycbzLyE1s87cTWBKd8AaRwcN2F00wNrwI__5PtEBnFk8cpJvAenrYkHNEeQcXnECvaUa_/exec;

// ── WEEK HELPERS ──
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  dt.setHours(0,0,0,0);
  return dt;
}
function weekKey(monday) {
  return monday.toISOString().slice(0,10);
}
function formatRange(monday) {
  const fri = new Date(monday); fri.setDate(monday.getDate() + 4);
  const opts = { day: 'numeric', month: 'short' };
  return monday.toLocaleDateString('en-GB', opts) + ' – ' + fri.toLocaleDateString('en-GB', opts);
}
function weekTitle(monday) {
  const now = getMonday(new Date());
  const diff = Math.round((monday - now) / (7*24*3600*1000));
  if (diff === 0) return 'This week';
  if (diff === 1) return 'Next week';
  if (diff === -1) return 'Last week';
  if (diff > 0) return `In ${diff} weeks`;
  return `${Math.abs(diff)} weeks ago`;
}

// ── STATE ──
let currentMonday = getMonday(new Date());
let saveTimers = {};

// ── UI ──
function updateHeader() {
  document.getElementById('wk-range').textContent = formatRange(currentMonday);
  document.getElementById('wk-title').textContent = weekTitle(currentMonday);
}

// ── LOAD ──
async function loadWeek() {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    document.getElementById('setup-notice').style.display = 'block';
    document.getElementById('status-pill').textContent = 'not connected';
    ['6g','8b','8g'].forEach(k => {
      document.getElementById('ta-'+k).value = '';
      document.getElementById('ta-'+k).placeholder = 'Set up the Apps Script URL first (see instructions)';
    });
    return;
  }
  document.getElementById('status-pill').textContent = 'loading…';
  const key = weekKey(currentMonday);
  try {
    const res = await fetch(SCRIPT_URL + '?action=get&week=' + key);
    const data = await res.json();
    const row = data.row || {};
    document.getElementById('ta-6g').value = row['6g'] || '';
    document.getElementById('ta-8b').value = row['8b'] || '';
    document.getElementById('ta-8g').value = row['8g'] || '';
    document.getElementById('status-pill').textContent = 'connected';
    document.getElementById('setup-notice').style.display = 'none';
  } catch(e) {
    document.getElementById('status-pill').textContent = 'offline';
  }
}

// ── SAVE ──
function scheduleSave(group) {
  clearTimeout(saveTimers[group]);
  const ind = document.getElementById('save-'+group);
  ind.textContent = 'saving…'; ind.classList.add('visible');
  saveTimers[group] = setTimeout(() => saveSlot(group), 1200);
}

async function saveSlot(group) {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  const key = weekKey(currentMonday);
  const val = document.getElementById('ta-'+group).value;
  const ind = document.getElementById('save-'+group);
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'save', week: key, group: group, value: val })
    });
    ind.textContent = 'saved ✓';
    setTimeout(() => ind.classList.remove('visible'), 1500);
  } catch(e) {
    ind.textContent = 'error saving';
  }
}

// ── EVENTS ──
['6g','8b','8g'].forEach(group => {
  document.getElementById('ta-'+group).addEventListener('input', () => scheduleSave(group));
});
document.getElementById('prev-btn').addEventListener('click', () => {
  currentMonday = new Date(currentMonday); currentMonday.setDate(currentMonday.getDate()-7);
  updateHeader(); loadWeek();
});
document.getElementById('next-btn').addEventListener('click', () => {
  currentMonday = new Date(currentMonday); currentMonday.setDate(currentMonday.getDate()+7);
  updateHeader(); loadWeek();
});
document.getElementById('today-btn').addEventListener('click', () => {
  currentMonday = getMonday(new Date());
  updateHeader(); loadWeek();
});

// ── INIT ──
updateHeader();
loadWeek();
</script>
</body>
</html>
