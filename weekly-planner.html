<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ec;
    --card: #ffffff;
    --border: #ddd8cc;
    --text: #2a2520;
    --muted: #9a928a;
    --c6g: #2e6da4;
    --c6g-bg: #e8f0f8;
    --c8b: #8b5e3c;
    --c8b-bg: #f5ede5;
    --c8g: #4a7c59;
    --c8g-bg: #e8f2ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 4rem;
  }
  header {
    background: #2a2520;
    color: #fff;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #status-pill {
    font-size: 0.7rem;
    padding: 2px 9px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    font-family: 'DM Mono', monospace;
  }
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.25rem 1.5rem 0.75rem;
  }
  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--c6g-bg); }
  .week-label { text-align: center; min-width: 200px; }
  .wk-range {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .wk-title { font-size: 1.15rem; font-weight: 500; margin-top: 2px; }
  .today-btn {
    background: none;
    border: 1px solid var(--c6g);
    color: var(--c6g);
    font-size: 0.68rem;
    padding: 2px 9px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
    display: inline-block;
    transition: background 0.15s;
  }
  .today-btn:hover { background: var(--c6g-bg); }
  .legend {
    display: flex;
    gap: 1rem;
    justify-content: center;
    padding: 0 1.5rem 1rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .leg-6g { background: var(--c6g); }
  .leg-8b { background: var(--c8b); }
  .leg-8g { background: var(--c8g); }
  .days-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.6rem;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 0.75rem;
  }
  .day-col {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .day-header {
    background: #2a2520;
    color: #fff;
    text-align: center;
    padding: 0.5rem 0.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .day-slots { display: flex; flex-direction: column; }
  .band-label {
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.05em;
    padding: 5px 8px 2px;
    text-transform: uppercase;
    border-top: 1px dashed var(--border);
    margin-top: 2px;
    background: var(--bg);
  }
  .band-label.first { border-top: none; margin-top: 0; }
  .lesson-slot { padding: 5px 7px 7px; }
  .lesson-label {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 4px;
  }
  .class-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    padding: 1px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .badge-6g { background: var(--c6g); color: #fff; }
  .badge-8b { background: var(--c8b); color: #fff; }
  .badge-8g { background: var(--c8g); color: #fff; }
  .period-tag {
    font-size: 0.62rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .save-ind {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-ind.show { opacity: 1; }
  .save-ind.err { color: #c0392b; }
  textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
    resize: none;
    padding: 6px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text);
    background: #fafafa;
    min-height: 75px;
    transition: border-color 0.15s, background 0.15s;
  }
  textarea:focus { border-color: #aaa; background: #fff; }
  textarea::placeholder { color: #ccc; font-size: 0.75rem; }
  .no-lessons {
    padding: 1.5rem 0.5rem;
    text-align: center;
    font-size: 0.7rem;
    color: var(--border);
    font-family: 'DM Mono', monospace;
  }
  #setup-notice {
    max-width: 600px;
    margin: 0 auto 1rem;
    padding: 0 1rem;
    display: none;
  }
  .notice-box {
    background: #fff8e8;
    border: 1px solid #e8d08a;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 0.83rem;
    color: #7a5c00;
    line-height: 1.6;
  }
  .notice-box code {
    background: rgba(0,0,0,0.08);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
  }
  @media (max-width: 700px) { .days-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 420px) { .days-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>Weekly Planner</h1>
  <span id="status-pill">connecting…</span>
</header>

<div class="week-nav">
  <button class="nav-btn" id="prev-btn">&#8592;</button>
  <div class="week-label">
    <div class="wk-range" id="wk-range">—</div>
    <div class="wk-title" id="wk-title">—</div>
    <button class="today-btn" id="today-btn">This week</button>
  </div>
  <button class="nav-btn" id="next-btn">&#8594;</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot leg-6g"></div>6G</div>
  <div class="legend-item"><div class="legend-dot leg-8b"></div>8B</div>
  <div class="legend-item"><div class="legend-dot leg-8g"></div>8G</div>
</div>

<div id="setup-notice">
  <div class="notice-box">
    Setup needed — open this file in Notepad and replace <code>YOUR_APPS_SCRIPT_URL_HERE</code> with your deployed Apps Script URL.
  </div>
</div>

<div class="days-grid" id="days-grid"></div>

<script>
// ======================================================
// PASTE YOUR APPS SCRIPT URL BETWEEN THE QUOTES BELOW
// ======================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwr7YD8KV9q6bMfC3SynHi3oL0CinfWTJoR7nm1YzltwFjn_ydQkrs-Jbd8aU-ayliT/exec';
// ======================================================

const SCHEDULE = {
  mon: [
    { group:'6g', period:2, time:'9:20',  band:'morning' },
    { group:'8g', period:5, time:'12:15', band:'afterbreak' },
    { group:'8b', period:7, time:'2:50',  band:'afterlunch' },
  ],
  tue: [
    { group:'8b', period:1, time:'8:30',  band:'morning' },
    { group:'6g', period:2, time:'9:20',  band:'morning' },
  ],
  wed: [
    { group:'6g', period:1, time:'8:30',  band:'morning' },
    { group:'8b', period:3, time:'10:10', band:'morning' },
    { group:'8g', period:6, time:'2:00',  band:'afterlunch' },
  ],
  thu: [
    { group:'8g', period:1, time:'8:30',  band:'morning' },
    { group:'8b', period:3, time:'10:10', band:'morning' },
  ],
  fri: [
    { group:'6g', period:3, time:'10:10', band:'morning' },
    { group:'8g', period:6, time:'2:00',  band:'afterlunch' },
  ],
};

const DAYS = ['mon','tue','wed','thu','fri'];
const DAY_LABELS = { mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', fri:'Friday' };
const BAND_LABELS = { morning:'Morning', afterbreak:'After break', afterlunch:'After lunch' };

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff); dt.setHours(0,0,0,0);
  return dt;
}
function weekKey(m) { return m.toISOString().slice(0,10); }
function formatRange(m) {
  const fri = new Date(m); fri.setDate(m.getDate()+4);
  const o = { day:'numeric', month:'short' };
  return m.toLocaleDateString('en-GB',o) + ' – ' + fri.toLocaleDateString('en-GB',o);
}
function weekTitle(m) {
  const now = getMonday(new Date());
  const diff = Math.round((m-now)/(7*24*3600*1000));
  if (diff===0) return 'This week';
  if (diff===1) return 'Next week';
  if (diff===-1) return 'Last week';
  return diff>0 ? 'In '+diff+' weeks' : Math.abs(diff)+' weeks ago';
}

let currentMonday = getMonday(new Date());
let saveTimers = {};
let weekData = {};

function buildGrid() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';
  DAYS.forEach(function(day) {
    const lessons = SCHEDULE[day] || [];
    const col = document.createElement('div');
    col.className = 'day-col';
    col.innerHTML = '<div class="day-header">'+DAY_LABELS[day]+'</div>';
    const slots = document.createElement('div');
    slots.className = 'day-slots';
    if (lessons.length === 0) {
      slots.innerHTML = '<div class="no-lessons">no lessons</div>';
    } else {
      let lastBand = null;
      lessons.forEach(function(lesson) {
        if (lesson.band !== lastBand) {
          const bl = document.createElement('div');
          bl.className = 'band-label' + (lastBand === null ? ' first' : '');
          bl.textContent = BAND_LABELS[lesson.band];
          slots.appendChild(bl);
          lastBand = lesson.band;
        }
        const key = day+'-'+lesson.group;
        const slotDiv = document.createElement('div');
        slotDiv.className = 'lesson-slot';
        slotDiv.innerHTML =
          '<div class="lesson-label">' +
            '<span class="class-badge badge-'+lesson.group+'">'+lesson.group.toUpperCase()+'</span>' +
            '<span class="period-tag">P'+lesson.period+' · '+lesson.time+'</span>' +
            '<span class="save-ind" id="si-'+key+'"></span>' +
          '</div>' +
          '<textarea id="ta-'+key+'" placeholder="notes…"></textarea>';
        slots.appendChild(slotDiv);
      });
    }
    col.appendChild(slots);
    grid.appendChild(col);
  });

  DAYS.forEach(function(day) {
    (SCHEDULE[day]||[]).forEach(function(lesson) {
      const key = day+'-'+lesson.group;
      const ta = document.getElementById('ta-'+key);
      if (ta) ta.addEventListener('input', function() { scheduleSave(key); });
    });
  });
}

function populateFields() {
  DAYS.forEach(function(day) {
    (SCHEDULE[day]||[]).forEach(function(lesson) {
      const key = day+'-'+lesson.group;
      const ta = document.getElementById('ta-'+key);
      if (ta) ta.value = weekData[key] || '';
    });
  });
}

function updateHeader() {
  document.getElementById('wk-range').textContent = formatRange(currentMonday);
  document.getElementById('wk-title').textContent = weekTitle(currentMonday);
}

async function loadWeek() {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    document.getElementById('setup-notice').style.display = 'block';
    document.getElementById('status-pill').textContent = 'not connected';
    weekData = {}; populateFields(); return;
  }
  document.getElementById('status-pill').textContent = 'loading…';
  try {
    const res = await fetch(SCRIPT_URL + '?action=get&week=' + weekKey(currentMonday));
    const data = await res.json();
    weekData = data.row || {};
    populateFields();
    document.getElementById('status-pill').textContent = 'connected';
    document.getElementById('setup-notice').style.display = 'none';
  } catch(e) {
    document.getElementById('status-pill').textContent = 'offline';
  }
}

function scheduleSave(key) {
  clearTimeout(saveTimers[key]);
  const ind = document.getElementById('si-'+key);
  if (ind) { ind.textContent = 'saving…'; ind.className = 'save-ind show'; }
  saveTimers[key] = setTimeout(function() { doSave(key); }, 1200);
}

async function doSave(key) {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  const ta = document.getElementById('ta-'+key);
  if (!ta) return;
  const ind = document.getElementById('si-'+key);
  const value = encodeURIComponent(ta.value);
  const week = weekKey(currentMonday);
  try {
    const res = await fetch(SCRIPT_URL + '?action=save&week=' + week + '&key=' + key + '&value=' + value);
    const data = await res.json();
    if (data.success) {
      if (ind) { ind.textContent = 'saved ✓'; ind.className = 'save-ind show'; setTimeout(function(){ ind.className = 'save-ind'; }, 1500); }
    } else {
      if (ind) { ind.textContent = 'error'; ind.className = 'save-ind show err'; }
    }
  } catch(e) {
    if (ind) { ind.textContent = 'error'; ind.className = 'save-ind show err'; }
  }
}

document.getElementById('prev-btn').onclick = function() { currentMonday.setDate(currentMonday.getDate()-7); updateHeader(); loadWeek(); };
document.getElementById('next-btn').onclick = function() { currentMonday.setDate(currentMonday.getDate()+7); updateHeader(); loadWeek(); };
document.getElementById('today-btn').onclick = function() { currentMonday = getMonday(new Date()); updateHeader(); loadWeek(); };

buildGrid();
updateHeader();
loadWeek();
</script>
</body>
</html>
