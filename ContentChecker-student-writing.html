<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.9rem;
    color: #666;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0ddd6;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    resize: vertical;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafaf8;
    color: #1a1a1a;
    font-family: inherit;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: #b0a89a;
    background: #fff;
  }

  #task-input { min-height: 140px; }
  #student-text { min-height: 160px; margin-top: 1.25rem; }

  .divider {
    border: none;
    border-top: 1px solid #ede9e3;
    margin: 1.25rem 0;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  button {
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  #check-btn {
    background: #2a2a2a;
    color: #fff;
  }

  #check-btn:hover { background: #444; }
  #check-btn:disabled { background: #aaa; cursor: not-allowed; }

  #clear-btn {
    background: transparent;
    color: #888;
    border: 1px solid #ddd;
  }

  #clear-btn:hover { background: #f5f4f0; }

  .status {
    font-size: 13px;
    color: #888;
    margin-top: 10px;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #ddd;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    margin-top: 12px;
    padding: 10px 14px;
    background: #fff0ee;
    border: 1px solid #f5c4b3;
    border-radius: 8px;
    font-size: 13px;
    color: #993C1D;
    display: none;
  }

  #results { display: none; }

  .results-label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 12px;
  }

  /* Word count warning */
  .wordcount-warn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #7a3a00;
    font-weight: 600;
    padding: 10px 14px;
    background: #fff4e0;
    border-radius: 8px;
    border: 1px solid #f5d08a;
    margin-bottom: 1.25rem;
  }

  /* Bullet coverage */
  .bullet-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .bullet-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #ede9e3;
    background: #fafaf8;
  }

  .bullet-item.status-yes  { background: #edf7ee; border-color: #b5e0bc; }
  .bullet-item.status-partial { background: #fff8e8; border-color: #f5d08a; }
  .bullet-item.status-no  { background: #fdf0f0; border-color: #f5c4b3; }

  .bullet-icon {
    font-size: 16px;
    min-width: 22px;
    padding-top: 1px;
  }

  .bullet-content { flex: 1; }

  .bullet-point-text {
    font-size: 13px;
    font-weight: 700;
    color: #555;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .bullet-feedback {
    font-size: 14px;
    color: #333;
    line-height: 1.5;
  }

  .bullet-item.status-yes  .bullet-feedback { color: #1f5c28; }
  .bullet-item.status-partial .bullet-feedback { color: #6b4a00; }
  .bullet-item.status-no  .bullet-feedback { color: #8c1a1a; }

  /* Paragraphing */
  .para-feedback {
    font-size: 14px;
    line-height: 1.7;
    color: #333;
    padding: 12px 14px;
    background: #fafaf8;
    border-radius: 8px;
    border: 1px solid #ede9e3;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Content Checker</h1>
    <p>Paste the writing task and the student's answer. Feedback covers bullet point coverage and paragraphing.</p>
  </header>

  <div class="card">
    <label for="task-input">Writing task / question</label>
    <textarea id="task-input" placeholder="Paste the full writing task here, including the bullet points. For example:&#10;&#10;You recently took part in a concert at your school...&#10;&#10;In your email you should:&#10;• describe how you prepared&#10;• explain what happened&#10;• say what you did afterwards"></textarea>

    <hr class="divider">

    <label for="student-text">Student text</label>
    <textarea id="student-text" placeholder="Paste the student's writing here..."></textarea>

    <div class="btn-row">
      <button id="check-btn" onclick="checkContent()">Check content</button>
      <button id="clear-btn" onclick="clearAll()">Clear</button>
    </div>
    <div class="status" id="status"></div>
    <div class="error-box" id="error-box"></div>
  </div>

  <div id="results">

    <div id="wordcount-section"></div>

    <div class="card">
      <div class="results-label">Bullet point coverage</div>
      <div class="bullet-list" id="bullet-list"></div>
    </div>

    <div class="card">
      <div class="results-label">Paragraphing</div>
      <div class="para-feedback" id="para-feedback"></div>
    </div>

  </div>
</div>

<script>
const PROXY = "https://claude-proxy.paulbolter.workers.dev/";

function countWords(text) {
  return text.trim().split(/\s+/).filter(w => w.length > 0).length;
}

async function checkContent() {
  const task = document.getElementById('task-input').value.trim();
  const text = document.getElementById('student-text').value.trim();

  const errorBox = document.getElementById('error-box');
  errorBox.style.display = 'none';

  if (!task) {
    errorBox.textContent = 'Please paste the writing task before checking.';
    errorBox.style.display = 'block';
    return;
  }
  if (!text) {
    errorBox.textContent = 'Please paste the student text before checking.';
    errorBox.style.display = 'block';
    return;
  }

  const btn = document.getElementById('check-btn');
  const status = document.getElementById('status');

  btn.disabled = true;
  document.getElementById('results').style.display = 'none';
  status.innerHTML = '<div class="spinner"></div> Checking...';

  const prompt = `You are a helpful English writing assistant giving feedback to an ESL student (age 13-14, B1-B2 level) on their IGCSE Exercise 5 email writing task.

Your job is to do two things:
1. Extract the bullet points from the task, then check whether the student addressed each one.
2. Give brief feedback on paragraphing.

Writing task:
${task}

Student text:
${text}

Return ONLY a valid JSON object. No markdown, no explanation, no extra text.

For each bullet point, decide:
- "yes" = clearly addressed with enough detail
- "partial" = mentioned but underdeveloped (too brief, vague, or incomplete)
- "no" = not addressed at all

Use simple, encouraging language. Speak directly to the student ("you", "your writing").
Keep each feedback comment to 1-2 sentences.

For paragraphing, write 2-3 sentences of honest but encouraging feedback. Comment on: whether each bullet point has its own paragraph, whether there is a clear opening and closing, and whether ideas are mixed or kept separate. Speak directly to the student.

Return this exact format:
{
  "bullets": [
    {
      "bullet_text": "the bullet point as written in the task",
      "status": "yes" | "partial" | "no",
      "comment": "short student-facing feedback"
    }
  ],
  "paragraphing": "2-3 sentences of student-facing paragraphing feedback"
}`;

  try {
    const resp = await fetch(PROXY, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!resp.ok) {
      const t = await resp.text();
      throw new Error(`Server error ${resp.status}: ${t.slice(0, 300)}`);
    }

    const data = await resp.json();
    if (data.error) throw new Error(JSON.stringify(data.error));

    const raw = (data.content || []).map(b => b.text || '').join('');
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found in response. Raw: ' + raw.slice(0, 200));
    const result = JSON.parse(match[0]);

    renderResults(text, result);

  } catch (e) {
    errorBox.textContent = 'Error: ' + e.message;
    errorBox.style.display = 'block';
  }

  btn.disabled = false;
  status.innerHTML = '';
}

function renderResults(text, result) {
  const wordcount = countWords(text);
  const wcSection = document.getElementById('wordcount-section');

  if (wordcount < 80) {
    wcSection.innerHTML = `<div class="wordcount-warn">⚠ Your answer is only ${wordcount} words. Try to write at least 120 words to cover all three bullet points properly.</div>`;
  } else {
    wcSection.innerHTML = '';
  }

  // Bullet points
  const bulletList = document.getElementById('bullet-list');
  bulletList.innerHTML = '';

  const icons = { yes: '✓', partial: '◑', no: '✗' };
  const statusClass = { yes: 'status-yes', partial: 'status-partial', no: 'status-no' };

  (result.bullets || []).forEach(b => {
    const s = b.status || 'no';
    const item = document.createElement('div');
    item.className = `bullet-item ${statusClass[s] || ''}`;
    item.innerHTML = `
      <div class="bullet-icon">${icons[s] || '?'}</div>
      <div class="bullet-content">
        <div class="bullet-point-text">${esc(b.bullet_text)}</div>
        <div class="bullet-feedback">${esc(b.comment)}</div>
      </div>`;
    bulletList.appendChild(item);
  });

  // Paragraphing
  document.getElementById('para-feedback').textContent = result.paragraphing || '';

  document.getElementById('results').style.display = 'block';
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function clearAll() {
  document.getElementById('task-input').value = '';
  document.getElementById('student-text').value = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('status').innerHTML = '';
  document.getElementById('wordcount-section').innerHTML = '';
}
</script>
</body>
</html>
