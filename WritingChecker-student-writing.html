<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.9rem;
    color: #666;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0ddd6;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    resize: vertical;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafaf8;
    color: #1a1a1a;
    font-family: inherit;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: #b0a89a;
    background: #fff;
  }

  #task-input { min-height: 80px; }
  #student-text { min-height: 160px; margin-top: 1.25rem; }

  .divider {
    border: none;
    border-top: 1px solid #ede9e3;
    margin: 1.25rem 0;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #888;
    transition: all 0.15s;
  }

  .tab-btn:hover { background: #f5f4f0; }

  .tab-btn.active-tense {
    background: #e8f0ff;
    border-color: #4a7de8;
    color: #1a3a8a;
  }

  .tab-btn.active-article {
    background: #fff7e0;
    border-color: #e6a817;
    color: #7a5000;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  button.check-btn {
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .check-btn-tense { background: #2a2a2a; color: #fff; }
  .check-btn-tense:hover { background: #444; }
  .check-btn-tense:disabled { background: #aaa; cursor: not-allowed; }

  .check-btn-article { background: #2a2a2a; color: #fff; }
  .check-btn-article:hover { background: #444; }
  .check-btn-article:disabled { background: #aaa; cursor: not-allowed; }

  button.clear-btn {
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    color: #888;
    border: 1px solid #ddd;
    transition: all 0.15s;
  }
  button.clear-btn:hover { background: #f5f4f0; }

  .status {
    font-size: 13px;
    color: #888;
    margin-top: 10px;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #ddd;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    margin-top: 12px;
    padding: 10px 14px;
    background: #fff0ee;
    border: 1px solid #f5c4b3;
    border-radius: 8px;
    font-size: 13px;
    color: #993C1D;
    display: none;
  }

  /* Results */
  .results-card { display: none; }

  .results-label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 10px;
  }

  .marked-text {
    font-size: 15px;
    line-height: 2;
    color: #1a1a1a;
    white-space: pre-wrap;
  }

  /* Tense error style */
  .err-tense {
    background: #e8f0ff;
    border-bottom: 2px solid #4a7de8;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
    color: #1a3a8a;
  }

  /* Article error style */
  .err-missing {
    background: #fff0b3;
    border-bottom: 2px solid #e6a817;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
    color: #7a5000;
  }

  .feedback-list {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .feedback-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 14px;
    padding: 8px 12px;
    background: #fafaf8;
    border-radius: 8px;
    border: 1px solid #ede9e3;
  }

  .fb-num-tense {
    font-weight: 700;
    color: #4a7de8;
    font-size: 13px;
    min-width: 20px;
    padding-top: 1px;
  }

  .fb-num-article {
    font-weight: 700;
    color: #e6a817;
    font-size: 13px;
    min-width: 20px;
    padding-top: 1px;
  }

  .fb-text { color: #333; line-height: 1.5; }
  .fb-text strong { color: #1a1a1a; }

  .no-errors {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #2d7a3a;
    font-weight: 600;
    padding: 10px 14px;
    background: #edf7ee;
    border-radius: 8px;
    border: 1px solid #b5e0bc;
  }

  .count-badge-tense {
    display: inline-block;
    background: #e8f0ff;
    color: #1a3a8a;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
    margin-left: 8px;
  }

  .count-badge-article {
    display: inline-block;
    background: #fff7e0;
    color: #7a5000;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
    margin-left: 8px;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>Writing Checker</h1>
    <p>Paste the task and the student's writing, then choose what to check.</p>
  </header>

  <!-- Shared input card -->
  <div class="card">
    <label for="task-input">Writing task / question</label>
    <textarea id="task-input" placeholder="Paste the writing task or question here. For example: 'Write an email to your friend describing what you did last weekend.'"></textarea>

    <hr class="divider">

    <label for="student-text">Student text</label>
    <textarea id="student-text" placeholder="Paste the student's writing here..."></textarea>
  </div>

  <!-- Tab buttons -->
  <div class="tabs">
    <button class="tab-btn active-tense" id="tab-tense" onclick="switchTab('tense')">🔵 Check Tenses</button>
    <button class="tab-btn" id="tab-article" onclick="switchTab('article')">🟡 Check Articles</button>
  </div>

  <!-- Tense tab panel -->
  <div class="tab-panel active" id="panel-tense">
    <div class="card">
      <p style="font-size:13px; color:#666; margin-bottom:12px;">Finds verb tense errors only — uses the writing task to decide which tenses are correct.</p>
      <div class="btn-row">
        <button class="check-btn check-btn-tense" id="check-btn-tense" onclick="checkTenses()">Check tenses</button>
        <button class="clear-btn" onclick="clearAll()">Clear</button>
      </div>
      <div class="status" id="status-tense"></div>
      <div class="error-box" id="error-tense"></div>
    </div>

    <div class="card results-card" id="results-tense">
      <div class="results-label">
        Marked text
        <span id="badge-tense" class="count-badge-tense" style="display:none;"></span>
      </div>
      <div class="marked-text" id="marked-tense"></div>
      <div class="feedback-list" id="feedback-tense"></div>
    </div>
  </div>

  <!-- Article tab panel -->
  <div class="tab-panel" id="panel-article">
    <div class="card">
      <p style="font-size:13px; color:#666; margin-bottom:12px;">Finds article errors only — missing, wrong, or extra use of <em>a</em>, <em>an</em>, <em>the</em>.</p>
      <div class="btn-row">
        <button class="check-btn check-btn-article" id="check-btn-article" onclick="checkArticles()">Check articles</button>
        <button class="clear-btn" onclick="clearAll()">Clear</button>
      </div>
      <div class="status" id="status-article"></div>
      <div class="error-box" id="error-article"></div>
    </div>

    <div class="card results-card" id="results-article">
      <div class="results-label">
        Marked text
        <span id="badge-article" class="count-badge-article" style="display:none;"></span>
      </div>
      <div class="marked-text" id="marked-article"></div>
      <div class="feedback-list" id="feedback-article"></div>
    </div>
  </div>

</div>

<script>
const PROXY = "https://claude-proxy.paulbolter.workers.dev/";

function switchTab(tab) {
  document.getElementById('panel-tense').classList.toggle('active', tab === 'tense');
  document.getElementById('panel-article').classList.toggle('active', tab === 'article');

  const btnTense = document.getElementById('tab-tense');
  const btnArticle = document.getElementById('tab-article');
  btnTense.className = 'tab-btn' + (tab === 'tense' ? ' active-tense' : '');
  btnArticle.className = 'tab-btn' + (tab === 'article' ? ' active-article' : '');
}

function getInputs() {
  return {
    task: document.getElementById('task-input').value.trim(),
    text: document.getElementById('student-text').value.trim()
  };
}

async function checkTenses() {
  const { task, text } = getInputs();
  const errorBox = document.getElementById('error-tense');

  if (!task) {
    errorBox.textContent = 'Please paste the writing task before checking.';
    errorBox.style.display = 'block';
    return;
  }
  if (!text) {
    errorBox.textContent = 'Please paste the student text before checking.';
    errorBox.style.display = 'block';
    return;
  }

  const btn = document.getElementById('check-btn-tense');
  const status = document.getElementById('status-tense');

  btn.disabled = true;
  errorBox.style.display = 'none';
  document.getElementById('results-tense').style.display = 'none';
  status.innerHTML = '<div class="spinner"></div> Checking...';

  const prompt = `You are an English tense checker for ESL students (ages 11-14, B1-B2 level).
Your ONLY job is to find tense errors — places where the student used the wrong verb tense.
Use the writing task to decide what tense(s) are correct for this piece of writing.
Do NOT comment on spelling, vocabulary, articles, punctuation, or any other grammar.

Writing task:
${task}

Student text:
${text}

Return ONLY a valid JSON object. No markdown, no explanation, no extra text.

Return this exact format:
{
  "errors": [
    {
      "wrong_phrase": "exact substring from the student text that contains the error (2-6 words for context)",
      "corrected_phrase": "the corrected version of that same phrase",
      "note": "short, simple note. For example: 'use simple past here, not present' or 'this should be past tense: went, not go'"
    }
  ]
}

If there are no tense errors, return: {"errors": []}`;

  try {
    const resp = await fetch(PROXY, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!resp.ok) {
      const t = await resp.text();
      throw new Error(`Server error ${resp.status}: ${t.slice(0, 300)}`);
    }

    const data = await resp.json();
    if (data.error) throw new Error(JSON.stringify(data.error));

    const raw = (data.content || []).map(b => b.text || '').join('');
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found in response. Raw: ' + raw.slice(0, 200));
    const result = JSON.parse(match[0]);
    renderResults('tense', text, result.errors || []);

  } catch (e) {
    errorBox.textContent = 'Error: ' + e.message;
    errorBox.style.display = 'block';
  }

  btn.disabled = false;
  status.innerHTML = '';
}

async function checkArticles() {
  const { task, text } = getInputs();
  const errorBox = document.getElementById('error-article');

  if (!text) {
    errorBox.textContent = 'Please paste the student text before checking.';
    errorBox.style.display = 'block';
    return;
  }

  const btn = document.getElementById('check-btn-article');
  const status = document.getElementById('status-article');

  btn.disabled = true;
  errorBox.style.display = 'none';
  document.getElementById('results-article').style.display = 'none';
  status.innerHTML = '<div class="spinner"></div> Checking...';

  const prompt = `You are an English article checker for Grade 8 ESL students (B2 level).
Your ONLY job is to find errors with English articles: missing "a", "an", "the", or a wrong article used before a countable noun.
Do NOT comment on spelling, grammar, vocabulary, punctuation, or anything else.

Analyse the student text below and return ONLY a valid JSON object. No markdown, no explanation, no extra text.

Return this exact format:
{
  "errors": [
    {
      "wrong_phrase": "exact substring from the text that contains the error (2-5 words for context)",
      "corrected_phrase": "the corrected version of that same phrase",
      "note": "short note e.g. 'missing article before dog' or 'use THE not A here'"
    }
  ]
}

If there are no article errors, return: {"errors": []}

Student text:
${text}`;

  try {
    const resp = await fetch(PROXY, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!resp.ok) {
      const t = await resp.text();
      throw new Error(`Server error ${resp.status}: ${t.slice(0, 300)}`);
    }

    const data = await resp.json();
    if (data.error) throw new Error(JSON.stringify(data.error));

    const raw = (data.content || []).map(b => b.text || '').join('');
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found in response. Raw: ' + raw.slice(0, 200));
    const result = JSON.parse(match[0]);
    renderResults('article', text, result.errors || []);

  } catch (e) {
    errorBox.textContent = 'Error: ' + e.message;
    errorBox.style.display = 'block';
  }

  btn.disabled = false;
  status.innerHTML = '';
}

function renderResults(type, text, errors) {
  const markedDiv = document.getElementById('marked-' + type);
  const feedbackDiv = document.getElementById('feedback-' + type);
  const resultsCard = document.getElementById('results-' + type);
  const badge = document.getElementById('badge-' + type);
  const errClass = type === 'tense' ? 'err-tense' : 'err-missing';
  const numClass = type === 'tense' ? 'fb-num-tense' : 'fb-num-article';

  resultsCard.style.display = 'block';
  feedbackDiv.innerHTML = '';

  if (!errors.length) {
    markedDiv.innerHTML = esc(text);
    badge.style.display = 'none';
    feedbackDiv.innerHTML = '<div class="no-errors">✓ No ' + (type === 'tense' ? 'tense' : 'article') + ' errors found — well done!</div>';
    return;
  }

  badge.textContent = errors.length + ' error' + (errors.length !== 1 ? 's' : '');
  badge.style.display = 'inline-block';

  let html = esc(text);
  errors.forEach((err, i) => {
    if (!err.wrong_phrase) return;
    const escapedPhrase = esc(err.wrong_phrase);
    const re = new RegExp(escapedPhrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
    html = html.replace(re, match =>
      `<span class="${errClass}" title="Error ${i + 1}">${match}</span>`
    );
  });
  markedDiv.innerHTML = html;

  errors.forEach((err, i) => {
    const item = document.createElement('div');
    item.className = 'feedback-item';
    item.innerHTML = `<span class="${numClass}">${i + 1}</span><span class="fb-text"><strong>"${esc(err.wrong_phrase)}"</strong> → <strong>"${esc(err.corrected_phrase)}"</strong> — ${esc(err.note)}</span>`;
    feedbackDiv.appendChild(item);
  });
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function clearAll() {
  document.getElementById('task-input').value = '';
  document.getElementById('student-text').value = '';
  ['tense', 'article'].forEach(type => {
    document.getElementById('results-' + type).style.display = 'none';
    document.getElementById('error-' + type).style.display = 'none';
    document.getElementById('status-' + type).innerHTML = '';
  });
}
</script>
</body>
</html>
