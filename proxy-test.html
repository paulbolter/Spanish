<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proxy Test</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #1a1a2e; color: #eee; }
  h1 { color: #gold; color: #f0c040; }
  textarea { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: none; background: #2a2a4a; color: #eee; resize: vertical; }
  button { margin-top: 12px; padding: 12px 30px; background: #f0c040; color: #1a1a2e; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #ffd700; }
  #response { margin-top: 24px; padding: 16px; background: #2a2a4a; border-radius: 8px; min-height: 60px; line-height: 1.6; white-space: pre-wrap; }
  #status { margin-top: 8px; font-size: 13px; color: #aaa; }
</style>
</head>
<body>

<h1>🤖 Proxy Test</h1>
<p>Type any question and click Ask. If you get a reply, your proxy is working!</p>

<textarea id="question" rows="4" placeholder="Type your question here...">What is the capital of France? Answer in one sentence.</textarea>
<br>
<button onclick="askClaude()">Ask Claude</button>
<div id="status"></div>
<div id="response"></div>

<script>
async function askClaude() {
  const question = document.getElementById("question").value.trim();
  const status = document.getElementById("status");
  const response = document.getElementById("response");

  if (!question) return;

  status.textContent = "⏳ Waiting for response...";
  response.textContent = "";

  try {
    const res = await fetch("https://claude-proxy.paulbolter.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 500,
        messages: [{ role: "user", content: question }]
      })
    });

    const data = await res.json();

    if (data.content && data.content[0]) {
      response.textContent = data.content[0].text;
      status.textContent = "✅ Success! Your proxy is working.";
    } else {
      response.textContent = JSON.stringify(data, null, 2);
      status.textContent = "⚠️ Got a response but something looks off. See below.";
    }

  } catch (err) {
    status.textContent = "❌ Error: " + err.message;
  }
}
</script>
</body>
</html>
