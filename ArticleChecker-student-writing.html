<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.9rem;
    color: #666;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0ddd6;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafaf8;
    color: #1a1a1a;
    font-family: inherit;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: #b0a89a;
    background: #fff;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  button {
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  #check-btn {
    background: #2a2a2a;
    color: #fff;
  }

  #check-btn:hover { background: #444; }
  #check-btn:disabled { background: #aaa; cursor: not-allowed; }

  #clear-btn {
    background: transparent;
    color: #888;
    border: 1px solid #ddd;
  }

  #clear-btn:hover { background: #f5f4f0; }

  .status {
    font-size: 13px;
    color: #888;
    margin-top: 10px;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #ddd;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    margin-top: 12px;
    padding: 10px 14px;
    background: #fff0ee;
    border: 1px solid #f5c4b3;
    border-radius: 8px;
    font-size: 13px;
    color: #993C1D;
    display: none;
  }

  #results { display: none; }

  .results-label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 10px;
  }

  .marked-text {
    font-size: 15px;
    line-height: 2;
    color: #1a1a1a;
  }

  .err-word {
    background: #fff0b3;
    border-bottom: 2px solid #e6a817;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
    color: #7a5000;
  }

  .err-missing {
    background: #fde8e8;
    border-bottom: 2px solid #e05555;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
    color: #c00;
  }

  .feedback-list {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .feedback-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 14px;
    padding: 8px 12px;
    background: #fafaf8;
    border-radius: 8px;
    border: 1px solid #ede9e3;
  }

  .fb-num {
    font-weight: 700;
    color: #e05555;
    font-size: 13px;
    min-width: 20px;
    padding-top: 1px;
  }

  .fb-text { color: #333; line-height: 1.5; }
  .fb-text strong { color: #1a1a1a; }

  .no-errors {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #2d7a3a;
    font-weight: 600;
    padding: 10px 14px;
    background: #edf7ee;
    border-radius: 8px;
    border: 1px solid #b5e0bc;
  }

  .count-badge {
    display: inline-block;
    background: #fde8e8;
    color: #c00;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
    margin-left: 8px;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Article Checker</h1>
    <p>Paste student writing below. Only article errors (a / an / the) will be marked.</p>
  </header>

  <div class="card">
    <label for="student-text">Student text</label>
    <textarea id="student-text" placeholder="Paste the student's writing here..."></textarea>
    <div class="btn-row">
      <button id="check-btn" onclick="checkArticles()">Check articles</button>
      <button id="clear-btn" onclick="clearAll()">Clear</button>
    </div>
    <div class="status" id="status"></div>
    <div class="error-box" id="error-box"></div>
  </div>

  <div class="card" id="results">
    <div class="results-label">Marked text <span id="count-badge" class="count-badge" style="display:none;"></span></div>
    <div class="marked-text" id="marked-output"></div>
    <div class="feedback-list" id="feedback-list"></div>
  </div>
</div>

<script>
const PROXY = "https://claude-proxy.paulbolter.workers.dev/";

async function checkArticles() {
  const text = document.getElementById('student-text').value.trim();
  if (!text) return;

  const btn = document.getElementById('check-btn');
  const status = document.getElementById('status');
  const errorBox = document.getElementById('error-box');

  btn.disabled = true;
  errorBox.style.display = 'none';
  document.getElementById('results').style.display = 'none';
  status.innerHTML = '<div class="spinner"></div> Checking...';

  const prompt = `You are an English article checker for Grade 8 ESL students (B2 level).
Your ONLY job is to find errors with English articles: missing "a", "an", "the", or a wrong article used before a countable noun.
Do NOT comment on spelling, grammar, vocabulary, punctuation, or anything else.

Analyse the student text below and return ONLY a valid JSON object. No markdown, no explanation, no extra text.

Return this exact format:
{
  "errors": [
    {
      "wrong_phrase": "exact substring from the text that contains the error (2-5 words for context)",
      "corrected_phrase": "the corrected version of that same phrase",
      "note": "short note e.g. 'missing article before dog' or 'use THE not A here'"
    }
  ]
}

If there are no article errors, return: {"errors": []}

Student text:
${text}`;

  try {
    const resp = await fetch(PROXY, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!resp.ok) {
      const t = await resp.text();
      throw new Error(`Server error ${resp.status}: ${t.slice(0, 300)}`);
    }

    const data = await resp.json();
    if (data.error) throw new Error(JSON.stringify(data.error));

    const raw = (data.content || []).map(b => b.text || '').join('');
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found in response. Raw: ' + raw.slice(0, 200));
    const result = JSON.parse(match[0]);
    renderResults(text, result.errors || []);

  } catch (e) {
    errorBox.textContent = 'Error: ' + e.message;
    errorBox.style.display = 'block';
  }

  btn.disabled = false;
  status.innerHTML = '';
}

function renderResults(text, errors) {
  const markedDiv = document.getElementById('marked-output');
  const feedbackDiv = document.getElementById('feedback-list');
  const results = document.getElementById('results');
  const badge = document.getElementById('count-badge');

  results.style.display = 'block';
  feedbackDiv.innerHTML = '';

  if (!errors.length) {
    markedDiv.innerHTML = esc(text);
    badge.style.display = 'none';
    feedbackDiv.innerHTML = '<div class="no-errors">✓ No article errors found — well done!</div>';
    return;
  }

  badge.textContent = errors.length + ' error' + (errors.length !== 1 ? 's' : '');
  badge.style.display = 'inline-block';

  let html = esc(text);
  errors.forEach((err, i) => {
    if (!err.wrong_phrase) return;
    const escapedPhrase = esc(err.wrong_phrase);
    const re = new RegExp(escapedPhrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
    html = html.replace(re, match =>
      `<span class="err-missing" title="Error ${i + 1}">${match}</span>`
    );
  });
  markedDiv.innerHTML = html;

  errors.forEach((err, i) => {
    const item = document.createElement('div');
    item.className = 'feedback-item';
    item.innerHTML = `<span class="fb-num">${i + 1}</span><span class="fb-text"><strong>"${esc(err.wrong_phrase)}"</strong> → <strong>"${esc(err.corrected_phrase)}"</strong> — ${esc(err.note)}</span>`;
    feedbackDiv.appendChild(item);
  });
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function clearAll() {
  document.getElementById('student-text').value = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('status').innerHTML = '';
}
</script>
</body>
</html>
