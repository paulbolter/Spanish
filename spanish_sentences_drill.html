<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Sentence Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1923;
    --card: #162030;
    --ink: #e8e0d0;
    --muted: #7a8a9a;
    --accent: #e8a020;
    --green: #4db87a;
    --border: rgba(255,255,255,0.07);
    --shadow: rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(232,160,32,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(77,184,122,0.05) 0%, transparent 55%);
  }

  header {
    text-align: center;
    margin-bottom: 10px;
  }

  header h1 {
    font-family: 'Lora', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--ink);
    line-height: 1.1;
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
  }

  /* Progress & score */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 620px;
    margin: 24px 0 12px;
    font-size: 0.83rem;
    color: var(--muted);
    font-weight: 500;
  }

  .prog-wrap {
    width: 100%;
    max-width: 620px;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .prog-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card-wrap {
    width: 100%;
    max-width: 620px;
    margin-bottom: 18px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 44px 40px;
    position: relative;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 12px 50px var(--shadow);
  }

  .sentence-num {
    position: absolute;
    top: 20px;
    right: 22px;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .hint-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .spanish-sentence {
    font-family: 'Lora', serif;
    font-size: 1.65rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 0;
  }

  /* Answer section */
  .answer-block {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    animation: rise 0.35s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .answer-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
    opacity: 0.8;
  }

  .english-sentence {
    font-family: 'Lora', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--green);
    line-height: 1.5;
  }

  /* New words section */
  .new-words-block {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .new-words-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .new-words-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .new-word-chip {
    background: rgba(232,160,32,0.1);
    border: 1px solid rgba(232,160,32,0.2);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 500;
  }

  .new-word-chip span {
    color: var(--muted);
    font-style: italic;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 620px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    padding: 14px 18px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    border: none;
    min-width: 110px;
  }

  .btn-reveal {
    background: var(--accent);
    color: #0f1923;
    box-shadow: 0 4px 20px rgba(232,160,32,0.3);
  }

  .btn-reveal:hover { background: #f0b030; transform: translateY(-1px); }

  .btn-next {
    background: rgba(255,255,255,0.06);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .btn-next:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }

  .btn-shuffle {
    background: transparent;
    color: var(--green);
    border: 1px solid rgba(77,184,122,0.25);
    flex: 0 0 auto;
  }

  .btn-shuffle:hover { background: rgba(77,184,122,0.08); }

  .hidden { display: none !important; }

  /* New words reference at bottom */
  .ref-toggle {
    margin-top: 30px;
    font-size: 0.82rem;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-align: center;
    opacity: 0.8;
  }

  .ref-table {
    max-width: 620px;
    width: 100%;
    margin-top: 14px;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--card);
    font-size: 0.85rem;
  }

  .ref-table table { width: 100%; border-collapse: collapse; }

  .ref-table th {
    background: rgba(255,255,255,0.04);
    padding: 10px 14px;
    text-align: left;
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .ref-table td {
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    color: var(--ink);
  }

  .ref-table td:first-child {
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--accent);
  }

  .ref-table tr:hover td { background: rgba(255,255,255,0.02); }

  .done-screen {
    text-align: center;
    padding: 30px 20px;
  }

  .done-screen h2 {
    font-family: 'Lora', serif;
    font-size: 2rem;
    margin-bottom: 10px;
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>Sentence <em>Drill</em></h1>
  <p>Read the Spanish — translate in your head — <strong>Spacebar</strong> to reveal &amp; advance</p>
</header>

<div class="topbar">
  <div>Sentence <strong id="cur">1</strong> of <strong id="total">20</strong></div>
  <div>Seen: <strong id="s-seen">0</strong> &nbsp;|&nbsp; Remaining: <strong id="s-left">20</strong></div>
</div>

<div class="prog-wrap">
  <div class="prog-bar" id="prog" style="width:0%"></div>
</div>

<div class="card-wrap">
  <div class="card" id="card">
    <div class="sentence-num" id="sent-num">#1</div>
    <div class="hint-label">🇪🇸 Spanish</div>
    <div class="spanish-sentence" id="spanish">—</div>
    <div class="answer-block hidden" id="answer-block">
      <div class="answer-label">🇬🇧 English</div>
      <div class="english-sentence" id="english">—</div>
      <div class="new-words-block" id="new-words-block"></div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-reveal" id="revealBtn" onclick="reveal()">👁 Reveal</button>
  <button class="btn btn-next hidden" id="nextBtn" onclick="next()">→ Next</button>
  <button class="btn btn-shuffle" onclick="reshuffle()">⟳ Shuffle</button>
</div>

<div class="ref-toggle" onclick="toggleRef()">📋 Show / hide new vocabulary list</div>
<div class="ref-table hidden" id="ref-table">
  <table>
    <thead><tr><th>Spanish</th><th>English</th></tr></thead>
    <tbody id="ref-body"></tbody>
  </table>
</div>

<script>
const sentences = [
  {
    es: "La cama es muy grande y cómoda.",
    en: "The bed is very big and comfortable.",
    new: [["muy","very"], ["cómoda","comfortable"]]
  },
  {
    es: "Quiero beber una cerveza fría en la playa.",
    en: "I want to drink a cold beer on the beach.",
    new: [["fría","cold (for things)"]]
  },
  {
    es: "El vecino hace mucho ruido por la noche.",
    en: "The neighbour makes a lot of noise at night.",
    new: [["por la noche","at night"]]
  },
  {
    es: "Necesito la llave porque la ventana está cerrada.",
    en: "I need the key because the window is closed.",
    new: [["porque","because"], ["cerrada","closed"]]
  },
  {
    es: "El médico es simpático pero su cocina es pequeña.",
    en: "The doctor is friendly but his kitchen is small.",
    new: [["su","his / her / their"]]
  },
  {
    es: "Voy al mercado porque necesito comprar comida nueva.",
    en: "I am going to the market because I need to buy new food.",
    new: [["al","to the (el → al)"]]
  },
  {
    es: "La música es lenta y bonita esta noche.",
    en: "The music is slow and pretty tonight.",
    new: [["esta noche","tonight"]]
  },
  {
    es: "No puedo dormir porque tengo un sueño muy extraño.",
    en: "I can't sleep because I have a very strange dream.",
    new: [["dormir","to sleep"], ["extraño","strange / odd"]]
  },
  {
    es: "El billete es importante — no puedo ir sin él.",
    en: "The ticket is important — I can't go without it.",
    new: [["sin","without"], ["sin él","without it / him"]]
  },
  {
    es: "La farmacia está cerca de la esquina.",
    en: "The pharmacy is near the corner.",
    new: [["cerca de","near / close to"]]
  },
  {
    es: "Quiero vivir cerca de la playa porque el sol es bonito.",
    en: "I want to live near the beach because the sun is beautiful.",
    new: []
  },
  {
    es: "El desayuno es fácil — bebo café y como pan.",
    en: "Breakfast is easy — I drink coffee and eat bread.",
    new: [["café","coffee"], ["pan","bread"]]
  },
  {
    es: "Tengo un recuerdo viejo de la montaña con mi familia.",
    en: "I have an old memory of the mountain with my family.",
    new: [["mi","my"]]
  },
  {
    es: "El autobús es lento hoy — voy a caminar.",
    en: "The bus is slow today — I am going to walk.",
    new: [["caminar","to walk"]]
  },
  {
    es: "La basura está cerca de la puerta — ¿puedes llevarla?",
    en: "The rubbish is near the door — can you take it?",
    new: [["la puerta","the door"], ["llevar","to carry / take"]]
  },
  {
    es: "Pienso que el partido de fútbol es muy interesante.",
    en: "I think that the football match is very interesting.",
    new: [["que","that (joining two ideas)"]]
  },
  {
    es: "El banco está cerrado hoy, pero hay un banco bonito en el parque.",
    en: "The bank is closed today, but there is a nice bench in the park.",
    new: [["hay","there is / there are"], ["el parque","the park"]]
  },
  {
    es: "¡Buena suerte! — el médico dice que la operación es fácil.",
    en: "Good luck! — the doctor says that the operation is easy.",
    new: [["dice","says (from decir)"], ["la operación","the operation"]]
  },
  {
    es: "La risa es importante — la vida sin risa es aburrida.",
    en: "Laughter is important — life without laughter is boring.",
    new: [["la vida","life"]]
  },
  {
    es: "El almuerzo en el mercado es bueno, rápido y barato.",
    en: "Lunch at the market is good, fast and cheap.",
    new: [["barato","cheap"]]
  },
];

// All new words deduplicated for reference table
const allNewWords = [];
const seen_words = new Set();
sentences.forEach(s => {
  s.new.forEach(([es, en]) => {
    if (!seen_words.has(es)) {
      seen_words.add(es);
      allNewWords.push([es, en]);
    }
  });
});

let deck = [];
let idx = 0;
let seen = 0;
let revealed = false;

function buildDeck() {
  deck = [...sentences].sort(() => Math.random() - 0.5);
  idx = 0; seen = 0; revealed = false;
  document.getElementById('total').textContent = deck.length;
  updateScore();
  showCard();
}

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  const s = deck[idx];

  document.getElementById('spanish').textContent = s.es;
  document.getElementById('sent-num').textContent = '#' + (idx + 1);
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('answer-block').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = (idx / deck.length * 100) + '%';
  revealed = false;
}

function reveal() {
  const s = deck[idx];
  document.getElementById('english').textContent = s.en;

  // Show new words for this sentence
  const nwb = document.getElementById('new-words-block');
  if (s.new.length > 0) {
    nwb.innerHTML = `<div class="new-words-label">🆕 New words in this sentence</div>
      <div class="new-words-list">${s.new.map(([es,en]) =>
        `<div class="new-word-chip">${es} <span>= ${en}</span></div>`
      ).join('')}</div>`;
  } else {
    nwb.innerHTML = `<div class="new-words-label" style="opacity:0.4">No new words — all from your lists! ✓</div>`;
  }

  document.getElementById('answer-block').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  if (!revealed) { seen++; updateScore(); revealed = true; }
}

function next() { idx++; showCard(); }

function reshuffle() { buildDeck(); }

function updateScore() {
  document.getElementById('s-seen').textContent = seen;
  document.getElementById('s-left').textContent = Math.max(0, deck.length - idx);
}

function showDone() {
  document.getElementById('card').innerHTML = `
    <div class="done-screen">
      <div style="font-size:2.6rem;margin-bottom:12px">🎉</div>
      <h2>¡Perfecto!</h2>
      <p style="color:var(--muted);font-size:0.95rem;">All 20 sentences done!<br>Click Shuffle to go again.</p>
    </div>`;
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = '100%';
}

function toggleRef() {
  document.getElementById('ref-table').classList.toggle('hidden');
}

// Build reference table
allNewWords.forEach(([es, en]) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${es}</td><td>${en}</td>`;
  document.getElementById('ref-body').appendChild(tr);
});

// Spacebar
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (!revealed) reveal();
    else next();
  }
});

buildDeck();
</script>
</body>
</html>
