<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Hablas Español!</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --card: #ffffff;
    --ink: #1a1200;
    --muted: #9a8060;
    --accent: #d4400a;
    --gold: #c8800a;
    --green: #1a7a3a;
    --border: #f0e0c8;
    --shadow: rgba(80,40,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 60px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(212,64,10,0.06) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(200,128,10,0.07) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: -1.5px;
    color: var(--ink);
    line-height: 1;
  }

  header h1 em { font-style: italic; color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 0.92rem;
    margin-top: 8px;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 0 10px;
    text-align: center;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 640px;
  }

  .pill {
    padding: 7px 18px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: white; }

  .card-wrap {
    width: 100%;
    max-width: 560px;
    margin: 26px 0 18px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 52px 40px 44px;
    text-align: center;
    position: relative;
    height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px var(--shadow);
    transition: box-shadow 0.2s;
    overflow: hidden;
  }

  .card:hover { box-shadow: 0 12px 50px var(--shadow); }

  .cat-badge {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    white-space: nowrap;
    background: rgba(212,64,10,0.1);
    color: var(--accent);
    border: 1px solid rgba(212,64,10,0.2);
  }

  .cat-badge.adjective { background: rgba(200,128,10,0.1); color: var(--gold); border-color: rgba(200,128,10,0.25); }
  .cat-badge.noun      { background: rgba(26,122,58,0.1);  color: var(--green); border-color: rgba(26,122,58,0.25); }
  .cat-badge.adjective-noun { background: rgba(212,64,10,0.1); color: var(--accent); border-color: rgba(212,64,10,0.2); }

  .card-counter {
    position: absolute;
    top: 22px;
    right: 24px;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
  }

  .word-display {
    font-family: 'Fraunces', serif;
    font-size: 3.6rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .word-type {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
  }

  .answer-block {
    margin-top: 26px;
    padding-top: 22px;
    border-top: 1.5px solid var(--border);
    width: 100%;
    animation: rise 0.3s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .answer-english {
    font-family: 'Fraunces', serif;
    font-size: 2.3rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -1px;
  }

  .answer-note {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
  }

  .highlight {
    color: var(--accent);
    font-style: normal;
    font-weight: 700;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 560px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    padding: 15px 18px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    border: none;
    min-width: 110px;
  }

  .btn-reveal {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 16px rgba(212,64,10,0.3);
  }

  .btn-reveal:hover { background: #b83508; transform: translateY(-1px); }

  .btn-next {
    background: white;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }

  .btn-next:hover { border-color: var(--ink); transform: translateY(-1px); }

  .btn-shuffle {
    background: white;
    color: var(--gold);
    border: 1.5px solid rgba(200,128,10,0.3);
    flex: 0 0 auto;
  }

  .btn-shuffle:hover { background: rgba(200,128,10,0.06); }

  .hidden { display: none !important; }

  .scorebar {
    display: flex;
    gap: 20px;
    margin: 18px 0 0;
    font-size: 0.88rem;
    color: var(--muted);
    font-weight: 500;
  }

  .scorebar strong { color: var(--ink); font-size: 1rem; }

  .prog-wrap {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    margin: 14px 0 0;
    overflow: hidden;
  }

  .prog-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .ref-toggle {
    margin-top: 26px;
    font-size: 0.82rem;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-align: center;
  }

  .ref-table {
    max-width: 560px;
    width: 100%;
    margin-top: 14px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: white;
    font-size: 0.85rem;
  }

  .ref-table table { width: 100%; border-collapse: collapse; }

  .ref-table th {
    background: var(--bg);
    padding: 10px 14px;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .ref-table td {
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    color: var(--ink);
  }

  .ref-table td:first-child {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }

  .ref-table tr:hover td { background: var(--bg); }
</style>
</head>
<body>

<header>
  <h1>¡Ya hablas <em>Español!</em></h1>
  <p>You already know more Spanish than you think — Spacebar to reveal</p>
</header>

<div class="section-label">Filter by type</div>
<div class="filter-row" id="cat-filters">
  <button class="pill active" onclick="setFilter('all', this)">All words</button>
  <button class="pill" onclick="setFilter('adjective', this)">Adjectives</button>
  <button class="pill" onclick="setFilter('noun', this)">Nouns</button>
</div>

<div class="card-wrap">
  <div class="card" id="card">
    <div class="cat-badge" id="cat-badge">ADJECTIVE</div>
    <div class="card-counter" id="counter">1 / 27</div>
    <div class="word-display" id="word-display">—</div>
    <div class="word-type" id="word-type"></div>
    <div class="answer-block hidden" id="answer-block">
      <div class="answer-english" id="ans-english">—</div>
      <div class="answer-note" id="ans-note"></div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-reveal" id="revealBtn" onclick="reveal()">👁 Reveal</button>
  <button class="btn btn-next hidden" id="nextBtn" onclick="next()">→ Next</button>
  <button class="btn btn-shuffle" onclick="reshuffle()">⟳ Shuffle</button>
</div>

<div class="scorebar">
  <div>Seen: <strong id="s-seen">0</strong></div>
  <div>Remaining: <strong id="s-left">—</strong></div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>

<div class="ref-toggle" onclick="toggleRef()">📋 Show / hide full word list</div>
<div class="ref-table hidden" id="ref-table">
  <table>
    <thead><tr><th>Spanish</th><th>English</th><th>Type</th></tr></thead>
    <tbody id="ref-body"></tbody>
  </table>
</div>

<script>
const words = [
  // Adjectives
  { es:"interesante",  en:"interesting",   cat:"adjective", note:"-ante ending = English -ing or -ant" },
  { es:"importante",   en:"important",     cat:"adjective", note:"-ante ending again — spot the pattern!" },
  { es:"diferente",    en:"different",     cat:"adjective", note:"-ente endings often = -ent in English" },
  { es:"excelente",    en:"excellent",     cat:"adjective", note:"-ente → -ent or -ent" },
  { es:"perfecto",     en:"perfect",       cat:"adjective", note:"-ecto → -ect" },
  { es:"fantástico",   en:"fantastic",     cat:"adjective", note:"-ico endings often = -ic in English" },
  { es:"histórico",    en:"historical",    cat:"adjective", note:"-ico → -ical" },
  { es:"político",     en:"political",     cat:"adjective", note:"-ico → -ical" },
  { es:"económico",    en:"economic",      cat:"adjective", note:"-ico → -ic" },
  { es:"artístico",    en:"artistic",      cat:"adjective", note:"-ístico → -istic" },
  { es:"dramático",    en:"dramatic",      cat:"adjective", note:"-ático → -atic" },
      // Nouns
  { es:"televisión",   en:"television",    cat:"noun", note:"-ión endings = -ion in English" },
  { es:"información",  en:"information",   cat:"noun", note:"-ción → -tion" },
  { es:"conversación", en:"conversation",  cat:"noun", note:"-ción → -tion" },
  { es:"comunicación", en:"communication", cat:"noun", note:"-ción → -tion" },
   { es:"problema",     en:"problem",       cat:"noun", note:"Ends in -a but masculine — el problema!" },
  { es:"programa",     en:"program",       cat:"noun", note:"Also masculine — el programa" },
  { es:"familia",      en:"family",        cat:"noun", note:"-ia endings often = -y in English" },
  { es:"música",       en:"music",         cat:"noun", note:"-ica → -ic" },
  { es:"fotografía",   en:"photography",   cat:"noun", note:"-ía → -y" },
   { es:"distancia",    en:"distance",      cat:"noun", note:"-cia → -ce" },
  { es:"silencio",     en:"silence",       cat:"noun", note:"-cio → -ce" },
];

const catLabels = { adjective:"ADJECTIVE", noun:"NOUN" };
const catBadgeClass = { adjective:"adjective", noun:"noun" };

let filterCat = "all";
let deck = [];
let idx = 0;
let seen = 0;
let revealed = false;

function buildDeck() {
  deck = filterCat === "all"
    ? [...words]
    : words.filter(w => w.cat === filterCat);
  deck = deck.sort(() => Math.random() - 0.5);
  idx = 0; seen = 0; revealed = false;
  updateScore();
  showCard();
}

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  const w = deck[idx];

  const badge = document.getElementById('cat-badge');
  badge.textContent = catLabels[w.cat];
  badge.className = "cat-badge " + catBadgeClass[w.cat];

  document.getElementById('word-display').textContent = w.es;
  document.getElementById('word-type').textContent = w.cat;
  document.getElementById('counter').textContent = `${idx+1} / ${deck.length}`;
  document.getElementById('answer-block').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = (idx / deck.length * 100) + '%';
  revealed = false;
}

function reveal() {
  const w = deck[idx];
  document.getElementById('ans-english').textContent = w.en;
  document.getElementById('ans-note').textContent = w.note;
  document.getElementById('answer-block').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  if (!revealed) { seen++; updateScore(); revealed = true; }
}

function next() { idx++; showCard(); }
function reshuffle() { buildDeck(); }

function updateScore() {
  document.getElementById('s-seen').textContent = seen;
  document.getElementById('s-left').textContent = Math.max(0, deck.length - idx);
}

function setFilter(cat, btn) {
  filterCat = cat;
  document.querySelectorAll('#cat-filters .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildDeck();
}

function showDone() {
  document.getElementById('card').innerHTML = `
    <div style="text-align:center;padding:20px">
      <div style="font-size:2.6rem;margin-bottom:12px">🎉</div>
      <div style="font-family:'Fraunces',serif;font-size:2rem;font-weight:900;letter-spacing:-1px;margin-bottom:10px;color:var(--accent)">¡Lo sabías todo!</div>
      <div style="color:var(--muted);font-size:0.95rem;">You knew it all along!<br>Click Shuffle to go again.</div>
    </div>`;
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = '100%';
}

function toggleRef() {
  document.getElementById('ref-table').classList.toggle('hidden');
}

// Build reference table
words.forEach(w => {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${w.es}</td><td>${w.en}</td><td style="color:var(--muted);font-size:0.8rem">${w.cat}</td>`;
  document.getElementById('ref-body').appendChild(tr);
});

// Spacebar
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (!revealed) reveal();
    else next();
  }
});

buildDeck();
</script>
</body>
</html>
