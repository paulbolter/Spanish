<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Football Test — Superfan Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --grass: #1a4a2e;
    --grass-light: #2d6b42;
    --pitch: #0f2d1c;
    --gold: #f5c842;
    --gold-dim: #b8952e;
    --white: #f0ede6;
    --grey: #8a8a8a;
    --red: #e03030;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--pitch);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.02) 49px, rgba(255,255,255,0.02) 50px),
      repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.02) 49px, rgba(255,255,255,0.02) 50px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .header .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--pitch);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 4px 12px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--white);
  }

  .header h1 span {
    color: var(--gold);
    display: block;
  }

  .header p {
    margin-top: 16px;
    color: var(--grey);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .league-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .league-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .league-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.06); }
  .league-btn.selected { background: var(--gold); border-color: var(--gold); color: var(--pitch); font-weight: 600; }
  .league-btn .flag { display: block; font-size: 22px; margin-bottom: 6px; }

  .difficulty-row { display: flex; gap: 10px; margin-bottom: 28px; }

  .diff-btn {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    text-align: center;
  }

  .diff-btn.selected { background: var(--grass); border-color: var(--grass-light); }
  .diff-btn:hover { border-color: var(--grass-light); }

  .start-btn {
    width: 100%;
    background: var(--gold);
    color: var(--pitch);
    border: none;
    padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .start-btn:hover { background: #ffd94d; transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .loading-screen { text-align: center; padding: 80px 20px; }

  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-screen p { color: var(--grey); font-size: 14px; letter-spacing: 1px; }
  .loading-screen .loading-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--white); margin-bottom: 8px; letter-spacing: 2px; }

  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }

  .q-counter { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; color: var(--grey); }
  .q-counter span { color: var(--gold); font-size: 22px; }
  .score-display { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; color: var(--grey); }
  .score-display span { color: var(--gold); font-size: 22px; }

  .progress-bar { height: 3px; background: var(--border); margin-bottom: 32px; }
  .progress-fill { height: 100%; background: var(--gold); transition: width 0.4s ease; }

  .question-box {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 28px 24px;
    margin-bottom: 20px;
    position: relative;
  }

  .question-box::before {
    content: attr(data-num);
    position: absolute;
    top: -14px; left: 20px;
    background: var(--gold);
    color: var(--pitch);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 2px 10px;
  }

  .question-text { font-size: 18px; font-weight: 500; line-height: 1.5; color: var(--white); }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

  @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }

  .option-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 16px 18px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1.4;
  }

  .option-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(245,200,66,0.06); }
  .option-btn .opt-letter { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--gold); min-width: 20px; }
  .option-btn.correct { background: rgba(45,107,66,0.4); border-color: var(--grass-light); color: #7edb9a; }
  .option-btn.wrong { background: rgba(224,48,48,0.15); border-color: var(--red); color: #e87070; }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
    border-left: 3px solid var(--gold);
    background: rgba(245,200,66,0.05);
    color: var(--white);
  }

  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { border-color: var(--grass-light); }
  .feedback-box.wrong-fb { border-color: var(--red); }

  .next-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--gold); color: var(--pitch); }

  .results-screen { text-align: center; padding: 20px 0; }
  .results-score { font-family: 'Bebas Neue', sans-serif; font-size: 100px; line-height: 1; color: var(--gold); }
  .results-score .denom { font-size: 40px; color: var(--grey); }
  .results-verdict { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; margin-bottom: 12px; color: var(--white); }
  .results-sub { color: var(--grey); font-size: 14px; margin-bottom: 36px; line-height: 1.6; max-width: 480px; margin-left: auto; margin-right: auto; }

  .play-again-btn {
    background: var(--gold);
    color: var(--pitch);
    border: none;
    padding: 16px 48px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .play-again-btn:hover { background: #ffd94d; }

  .error-box {
    background: rgba(224,48,48,0.1);
    border: 1px solid var(--red);
    padding: 20px;
    color: #e87070;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">⚽ SUPERFAN QUIZ</div>
    <h1>THE<span>FOOTBALL</span>TEST</h1>
    <p>Only real fans survive. Casual viewers need not apply.</p>
  </div>

  <!-- SETUP -->
  <div id="setup-screen">
    <div class="section-label">CHOOSE YOUR LEAGUE(S)</div>
    <div class="league-grid">
      <button class="league-btn selected" data-league="Premier League"><span class="flag">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span>Premier League</button>
      <button class="league-btn selected" data-league="Champions League"><span class="flag">⭐</span>Champions League</button>
      <button class="league-btn selected" data-league="La Liga"><span class="flag">🇪🇸</span>La Liga</button>
      <button class="league-btn" data-league="Bundesliga"><span class="flag">🇩🇪</span>Bundesliga</button>
      <button class="league-btn" data-league="Serie A"><span class="flag">🇮🇹</span>Serie A</button>
      <button class="league-btn" data-league="Ligue 1"><span class="flag">🇫🇷</span>Ligue 1</button>
    </div>

    <div class="section-label">DIFFICULTY</div>
    <div class="difficulty-row">
      <button class="diff-btn" data-diff="medium">Fan</button>
      <button class="diff-btn selected" data-diff="hard">Hardcore Fan</button>
      <button class="diff-btn" data-diff="expert">Obsessive</button>
    </div>

    <div id="error-msg" class="error-box hidden"></div>
    <button class="start-btn" id="start-btn">⚽ KICK OFF</button>
  </div>

  <!-- LOADING -->
  <div id="loading-screen" class="loading-screen hidden">
    <div class="spinner"></div>
    <div class="loading-title">GENERATING QUESTIONS</div>
    <p>Picking the ones that separate fans from tourists...</p>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" class="hidden">
    <div class="quiz-header">
      <div class="q-counter">QUESTION <span id="q-num">1</span> / 10</div>
      <div class="score-display">SCORE <span id="score-num">0</span></div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="question-box" id="question-box" data-num="Q1">
      <div class="question-text" id="question-text"></div>
    </div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="next-btn" id="next-btn">NEXT QUESTION →</button>
  </div>

  <!-- RESULTS -->
  <div id="results-screen" class="results-screen hidden">
    <div class="results-score" id="final-score">0<span class="denom">/10</span></div>
    <div class="results-verdict" id="results-verdict"></div>
    <div class="results-sub" id="results-sub"></div>
    <button class="play-again-btn" onclick="resetQuiz()">PLAY AGAIN</button>
  </div>

</div>

<script>
  const PROXY = 'https://claude-proxy.paulbolter.workers.dev/';

  let selectedLeagues = ['Premier League', 'Champions League', 'La Liga'];
  let selectedDiff = 'hard';
  let questions = [];
  let currentQ = 0;
  let score = 0;
  let answered = false;

  document.querySelectorAll('.league-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = btn.dataset.league;
      if (btn.classList.contains('selected')) {
        if (selectedLeagues.length <= 1) return;
        btn.classList.remove('selected');
        selectedLeagues = selectedLeagues.filter(x => x !== l);
      } else {
        btn.classList.add('selected');
        selectedLeagues.push(l);
      }
    });
  });

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedDiff = btn.dataset.diff;
    });
  });

  document.getElementById('start-btn').addEventListener('click', startQuiz);

  async function startQuiz() {
    const err = document.getElementById('error-msg');
    err.classList.add('hidden');
    show('loading-screen');
    hide('setup-screen');

    const diffLabel = {
      medium: 'genuine fan',
      hard: 'hardcore football obsessive',
      expert: 'football analyst or scout'
    }[selectedDiff];

    const leagues = selectedLeagues.join(', ');

    const prompt = `You are a football quiz master. Generate exactly 10 multiple-choice quiz questions about ${leagues}.

Difficulty: ${diffLabel}. Questions should be genuinely hard — the kind only someone who follows football closely would know. Avoid obvious questions. Ask about specific seasons, stats, transfers, goals, managerial decisions, records, cup runs, squad details, or recent events (up to mid-2025).

Mix current knowledge (last 2-3 seasons) with recent history (last 5-10 years).

Return ONLY a JSON array with exactly 10 objects. No preamble, no markdown, no backticks. Each object:
{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0,"explanation":"One sentence explaining the correct answer."}

"correct" is the 0-based index of the right answer.`;

    try {
      const res = await fetch(PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const raw = data.content.map(b => b.text || '').join('').trim()
        .replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();

      questions = JSON.parse(raw);
      if (!Array.isArray(questions) || questions.length < 5) throw new Error('Unexpected response format');

      currentQ = 0; score = 0;
      show('quiz-screen');
      hide('loading-screen');
      renderQuestion();

    } catch (e) {
      show('setup-screen');
      hide('loading-screen');
      err.textContent = '⚠ Could not load questions. Check your connection and try again. (' + e.message + ')';
      err.classList.remove('hidden');
    }
  }

  function renderQuestion() {
    const q = questions[currentQ];
    answered = false;

    document.getElementById('q-num').textContent = currentQ + 1;
    document.getElementById('score-num').textContent = score;
    document.getElementById('progress-fill').style.width = ((currentQ / questions.length) * 100) + '%';

    const qBox = document.getElementById('question-box');
    qBox.setAttribute('data-num', 'Q' + (currentQ + 1));
    document.getElementById('question-text').textContent = q.question;

    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    const letters = ['A', 'B', 'C', 'D'];

    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      const text = opt.replace(/^[ABCD]\)\s*/i, '');
      btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${text}</span>`;
      btn.addEventListener('click', () => handleAnswer(i));
      grid.appendChild(btn);
    });

    const fb = document.getElementById('feedback-box');
    fb.className = 'feedback-box';
    fb.textContent = '';
    document.getElementById('next-btn').classList.remove('show');
  }

  function handleAnswer(chosen) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    const correct = q.correct;
    const btns = document.querySelectorAll('.option-btn');

    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === correct) btn.classList.add('correct');
      else if (i === chosen) btn.classList.add('wrong');
    });

    const fb = document.getElementById('feedback-box');
    if (chosen === correct) {
      score++;
      document.getElementById('score-num').textContent = score;
      fb.classList.add('show', 'correct-fb');
      fb.textContent = '✓ Correct! ' + q.explanation;
    } else {
      fb.classList.add('show', 'wrong-fb');
      fb.textContent = '✗ Wrong. ' + q.explanation;
    }

    const nextBtn = document.getElementById('next-btn');
    nextBtn.classList.add('show');
    nextBtn.textContent = currentQ < questions.length - 1 ? 'NEXT QUESTION →' : 'SEE RESULTS →';
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    currentQ++;
    if (currentQ >= questions.length) showResults();
    else renderQuestion();
  });

  function showResults() {
    hide('quiz-screen');
    show('results-screen');

    const total = questions.length;
    document.getElementById('final-score').innerHTML = score + '<span class="denom">/' + total + '</span>';
    document.getElementById('progress-fill').style.width = '100%';

    const pct = score / total;
    let verdict, sub;

    if (pct >= 0.9) {
      verdict = '⚽ FOOTBALL ENCYCLOPAEDIA';
      sub = "Remarkable. You don't just watch football — you live it. Transfer windows, obscure stats, managerial press conferences... you've absorbed it all.";
    } else if (pct >= 0.7) {
      verdict = '🔥 PROPER FAN';
      sub = "You clearly watch a lot of football. A few blind spots, but overall you know your stuff. Season ticket holder energy.";
    } else if (pct >= 0.5) {
      verdict = '👀 INTERESTED OBSERVER';
      sub = "You follow the highlights and the big stories. But there are depths to this game you haven't explored yet.";
    } else if (pct >= 0.3) {
      verdict = '📱 CASUAL VIEWER';
      sub = "You caught a few but struggled overall. You might watch the big games, but the details are slipping by.";
    } else {
      verdict = '🤷 FOOTBALL TOURIST';
      sub = "It's okay. Football is complicated. Maybe stick to watching the World Cup final and pretending you knew all along.";
    }

    document.getElementById('results-verdict').textContent = verdict;
    document.getElementById('results-sub').textContent = sub;
  }

  function resetQuiz() {
    hide('results-screen');
    show('setup-screen');
    questions = []; currentQ = 0; score = 0;
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
