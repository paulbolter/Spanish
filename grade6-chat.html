<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 6 Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f0;
    --yellow: #FFD93D;
    --orange: #FF9A3C;
    --pink: #FF6B9D;
    --green: #6BCB77;
    --blue: #4D96FF;
    --purple: #C77DFF;
    --text: #2d2d2d;
    --muted: #aaa;
    --surface: #ffffff;
    --teacher-paul: #4D96FF;
    --teacher-nargiza: #FF6B9D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 15%, #FFD93D33 0%, transparent 35%),
      radial-gradient(circle at 90% 80%, #FF6B9D22 0%, transparent 35%),
      radial-gradient(circle at 80% 10%, #4D96FF22 0%, transparent 30%),
      radial-gradient(circle at 20% 85%, #6BCB7722 0%, transparent 30%);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .bg-shapes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .shape { position: absolute; opacity: 0.10; }
  .shape:nth-child(1) { width: 180px; height: 180px; background: var(--yellow); top: -50px; left: -40px; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; animation: float1 7s ease-in-out infinite; }
  .shape:nth-child(2) { width: 100px; height: 100px; background: var(--pink); top: 12%; right: 3%; border-radius: 50%; animation: float2 9s ease-in-out infinite; }
  .shape:nth-child(3) { width: 200px; height: 200px; background: var(--blue); bottom: -60px; right: -40px; border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; animation: float1 8s ease-in-out infinite reverse; }
  .shape:nth-child(4) { width: 90px; height: 90px; background: var(--green); bottom: 15%; left: 2%; border-radius: 50%; animation: float2 6s ease-in-out infinite; }
  .shape:nth-child(5) { width: 60px; height: 60px; background: var(--purple); top: 45%; left: 5%; border-radius: 50%; animation: float1 10s ease-in-out infinite; }

  @keyframes float1 {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    33%  { transform: translate(10px,-15px) rotate(5deg); }
    66%  { transform: translate(-6px,8px) rotate(-3deg); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50%  { transform: translate(-8px,12px) scale(1.07); }
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 660px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 0 12px;
  }

  header {
    text-align: center;
    padding: 18px 0 10px;
    position: relative;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--orange), var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(2px 2px 0px rgba(255,154,60,0.3));
    line-height: 1.1;
  }

  header p {
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 2px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }

  #teacher-btn {
    position: absolute;
    top: 18px;
    right: 0;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: white;
    border: none;
    border-radius: 30px;
    padding: 7px 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.78rem;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(77,150,255,0.3);
    transition: transform 0.15s, opacity 0.15s;
  }
  #teacher-btn:hover { transform: scale(1.05); }
  #teacher-btn.active { background: linear-gradient(135deg, #e05555, #ff9a3c); }

  #status-bar {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    min-height: 16px;
  }

  #teacher-mode-bar {
    display: none;
    background: white;
    border: 2.5px solid var(--yellow);
    border-radius: 14px;
    padding: 6px 14px;
    margin-bottom: 8px;
    font-size: 0.78rem;
    font-weight: 800;
    color: #b07800;
    align-items: center;
    gap: 6px;
  }
  #teacher-mode-bar.visible { display: flex; }

  #messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding-bottom: 12px;
    max-height: calc(100vh - 270px);
    min-height: 200px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 1px;
    animation: msgPop 0.22s cubic-bezier(.4,1.5,.6,1) both;
  }
  @keyframes msgPop {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 0 4px;
  }

  .msg-name {
    font-weight: 800;
    font-size: 0.75rem;
    color: var(--orange);
  }
  .msg-name.paul     { color: var(--teacher-paul); }
  .msg-name.nargiza  { color: var(--teacher-nargiza); }

  .msg-time { font-size: 0.65rem; color: var(--muted); }

  .teacher-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 800;
    padding: 1px 6px;
    border-radius: 20px;
    margin-left: 3px;
    vertical-align: middle;
    letter-spacing: 0.5px;
    color: white;
  }
  .badge-paul    { background: var(--teacher-paul); }
  .badge-nargiza { background: var(--teacher-nargiza); }

  .msg-bubble {
    background: white;
    border-radius: 4px 16px 16px 16px;
    padding: 7px 13px;
    font-size: 0.88rem;
    line-height: 1.45;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    max-width: 100%;
    word-break: break-word;
    border-left: 3px solid #f0e8e0;
  }
  .msg-bubble.paul    { border-left: 3px solid var(--teacher-paul); background: #f0f6ff; }
  .msg-bubble.nargiza { border-left: 3px solid var(--teacher-nargiza); background: #fff0f6; }
  .msg-bubble a { color: var(--blue); text-decoration: underline; word-break: break-all; }

  #empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  #empty-state .e-emoji { font-size: 2.5rem; margin-bottom: 8px; }
  #empty-state p { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: #ccc; }

  #input-area {
    background: var(--bg);
    border-top: 2.5px dashed #f0d8c8;
    padding: 10px 0 16px;
    position: sticky;
    bottom: 0;
    width: 100%;
  }

  #name-row { margin-bottom: 6px; }

  #name-input {
    width: 100%;
    border: 2px solid #f0d8c8;
    border-radius: 12px;
    padding: 8px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    background: white;
    outline: none;
    transition: border 0.2s;
    font-weight: 700;
  }
  #name-input:focus { border-color: var(--orange); }
  #name-input:disabled { background: #f5f0ff; color: var(--purple); font-weight: 800; }

  #message-row { display: flex; gap: 7px; }

  #message-input {
    flex: 1;
    border: 2px solid #f0d8c8;
    border-radius: 12px;
    padding: 8px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    background: white;
    outline: none;
    transition: border 0.2s;
    resize: none;
    min-height: 40px;
    max-height: 100px;
  }
  #message-input:focus { border-color: var(--orange); }

  #send-btn {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: white;
    border: none;
    border-radius: 12px;
    width: 44px;
    height: 44px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 0 #c4543e;
    transition: transform 0.12s, box-shadow 0.12s;
    flex-shrink: 0;
  }
  #send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #c4543e; }
  #send-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c4543e; }
  #send-btn:disabled { background: #ddd; box-shadow: none; cursor: not-allowed; }

  /* MODAL */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(45,45,45,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #modal-overlay.visible { display: flex; }

  #modal {
    background: white;
    border-radius: 24px;
    padding: 28px 24px 22px;
    width: 310px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    text-align: center;
    animation: modalIn 0.22s cubic-bezier(.4,1.4,.6,1) both;
    border: 3px solid #f0e8e0;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: none; }
  }

  #modal h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--orange), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  #modal p { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; font-weight: 600; }

  #teacher-select-row { display: flex; gap: 8px; margin-bottom: 12px; }

  .teacher-pick {
    flex: 1;
    padding: 10px 8px;
    border-radius: 14px;
    border: 2.5px solid #eee;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.82rem;
    cursor: pointer;
    transition: border 0.15s, background 0.15s;
    background: white;
    color: var(--text);
  }
  .teacher-pick.selected-paul    { border-color: var(--teacher-paul); background: #f0f6ff; color: var(--teacher-paul); }
  .teacher-pick.selected-nargiza { border-color: var(--teacher-nargiza); background: #fff0f6; color: var(--teacher-nargiza); }

  #pw-input {
    width: 100%;
    border: 2px solid #f0d8c8;
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    margin-bottom: 6px;
    text-align: center;
    letter-spacing: 3px;
    transition: border 0.2s;
  }
  #pw-input:focus { border-color: var(--orange); }
  #pw-error { color: #e05555; font-size: 0.78rem; font-weight: 800; min-height: 16px; margin-bottom: 10px; }

  #modal-btns { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 10px; border-radius: 12px; border: none;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .modal-btn:hover { opacity: 0.85; transform: scale(1.02); }
  #modal-cancel  { background: #f5f0eb; color: var(--muted); }
  #modal-confirm { background: linear-gradient(135deg, var(--orange), var(--pink)); color: white; }

  #config-notice {
    background: #fff3cd; border: 2px solid #ffc107; border-radius: 12px;
    padding: 14px; margin: 12px 0; font-size: 0.85rem; line-height: 1.6; color: #664d03;
  }

  #scroll-btn {
    display: none; position: fixed; bottom: 130px; right: 20px;
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: white; border: none; border-radius: 50%; width: 36px; height: 36px;
    font-size: 1rem; cursor: pointer; box-shadow: 0 3px 10px rgba(255,107,157,0.35);
    z-index: 50; align-items: center; justify-content: center;
  }
  #scroll-btn.visible { display: flex; }

  @media (max-width: 480px) {
    header h1 { font-size: 1.7rem; }
    #messages { max-height: calc(100vh - 250px); }
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div><div class="shape"></div><div class="shape"></div>
  <div class="shape"></div><div class="shape"></div>
</div>

<div class="page">
  <header>
    <h1>💬 Grade 6 Chat</h1>
    <p>Presidential School · Jizzakh</p>
    <button id="teacher-btn" onclick="handleTeacherBtn()">👨‍🏫 Teacher</button>
  </header>

  <div id="status-bar">Connecting...</div>

  <div id="teacher-mode-bar">
    <span id="teacher-mode-label">⭐ Teacher mode active</span>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="e-emoji">👋</div>
      <p>No messages yet — say hello!</p>
    </div>
  </div>

  <div id="input-area">
    <div id="name-row">
      <input type="text" id="name-input" placeholder="Your name" maxlength="30" />
    </div>
    <div id="message-row">
      <textarea id="message-input" placeholder="Type a message..." rows="1" maxlength="500"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
  </div>
</div>

<button id="scroll-btn" onclick="scrollToBottom()">↓</button>

<div id="modal-overlay">
  <div id="modal">
    <h2>🔐 Teacher Login</h2>
    <p>Who are you?</p>
    <div id="teacher-select-row">
      <button class="teacher-pick" id="pick-paul" onclick="selectTeacher('paul')">👨‍🏫 Mr Paul</button>
      <button class="teacher-pick" id="pick-nargiza" onclick="selectTeacher('nargiza')">👩‍🏫 Miss Nargiza</button>
    </div>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')confirmPassword()" />
    <div id="pw-error"></div>
    <div id="modal-btns">
      <button class="modal-btn" id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn" id="modal-confirm" onclick="confirmPassword()">Login</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzACcTBUpnaTKzDxjKNDkzViOT6VijTXvdeLhOvYQT0zOZ7xTIObBJ_PnywS2DAa5mKw/exec';
const TEACHER_PASSWORD = 'parrot';
const REFRESH_MS = 5000;

let isTeacher = false;
let teacherWho = null;
let selectedTeacher = null;
let lastCount = 0;
let isAtBottom = true;

const savedName = localStorage.getItem('g6chat_name') || '';
document.getElementById('name-input').value = savedName;
document.getElementById('name-input').addEventListener('input', e => {
  localStorage.setItem('g6chat_name', e.target.value.trim());
});

const msgInput = document.getElementById('message-input');
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('messages').addEventListener('scroll', function() {
  isAtBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 60;
  document.getElementById('scroll-btn').classList.toggle('visible', !isAtBottom);
});

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function handleTeacherBtn() {
  if (isTeacher) {
    isTeacher = false; teacherWho = null;
    document.getElementById('teacher-btn').textContent = '👨‍🏫 Teacher';
    document.getElementById('teacher-btn').classList.remove('active');
    document.getElementById('teacher-mode-bar').classList.remove('visible');
    document.getElementById('name-input').value = localStorage.getItem('g6chat_name') || '';
    document.getElementById('name-input').disabled = false;
  } else { openModal(); }
}

function selectTeacher(who) {
  selectedTeacher = who;
  document.getElementById('pick-paul').className = 'teacher-pick' + (who === 'paul' ? ' selected-paul' : '');
  document.getElementById('pick-nargiza').className = 'teacher-pick' + (who === 'nargiza' ? ' selected-nargiza' : '');
}

function openModal() {
  selectedTeacher = null;
  document.getElementById('pick-paul').className = 'teacher-pick';
  document.getElementById('pick-nargiza').className = 'teacher-pick';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('modal-overlay').classList.add('visible');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('visible'); }

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function confirmPassword() {
  if (!selectedTeacher) {
    document.getElementById('pw-error').textContent = '👆 Choose Mr Paul or Miss Nargiza first';
    return;
  }
  if (document.getElementById('pw-input').value !== TEACHER_PASSWORD) {
    document.getElementById('pw-error').textContent = '❌ Wrong password, try again';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    return;
  }
  isTeacher = true; teacherWho = selectedTeacher;
  const displayName = teacherWho === 'nargiza' ? 'Miss Nargiza' : 'Mr Paul';
  document.getElementById('teacher-btn').textContent = '✅ ' + displayName + ' (logout)';
  document.getElementById('teacher-btn').classList.add('active');
  document.getElementById('teacher-mode-label').textContent = '⭐ Posting as ' + displayName;
  document.getElementById('teacher-mode-bar').classList.add('visible');
  document.getElementById('name-input').value = displayName;
  document.getElementById('name-input').disabled = true;
  closeModal();
}

function formatTime(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString([], { day: 'numeric', month: 'short' }) + ' ' +
         d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkify(text) {
  return escHtml(text).replace(/(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function whoClass(msg) {
  const t = msg.isTeacher === 'TRUE' || msg.isTeacher === true;
  if (!t) return null;
  return (msg.name || '').toLowerCase().includes('nargiza') ? 'nargiza' : 'paul';
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  const wasBottom = isAtBottom;
  if (messages.length === 0) {
    container.innerHTML = `<div id="empty-state"><div class="e-emoji">👋</div><p>No messages yet — say hello!</p></div>`;
    return;
  }
  if (messages.length === lastCount) return;
  lastCount = messages.length;
  container.innerHTML = messages.map(msg => {
    const cls = whoClass(msg);
    let badge = '';
    if (cls === 'paul')    badge = '<span class="teacher-badge badge-paul">TEACHER</span>';
    if (cls === 'nargiza') badge = '<span class="teacher-badge badge-nargiza">TEACHER</span>';
    return `<div class="message">
      <div class="msg-meta">
        <span class="msg-name ${cls||''}">${escHtml(msg.name)}${badge}</span>
        <span class="msg-time">${formatTime(msg.timestamp)}</span>
      </div>
      <div class="msg-bubble ${cls||''}">${linkify(msg.message)}</div>
    </div>`;
  }).join('');
  if (wasBottom) scrollToBottom();
}

async function fetchMessages() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=get');
    const data = await res.json();
    renderMessages(data.messages || []);
    document.getElementById('status-bar').textContent =
      `${(data.messages||[]).length} messages · live`;
  } catch(e) {
    document.getElementById('status-bar').textContent = 'Could not load — check connection';
  }
}

async function sendMessage() {
  const nameEl = document.getElementById('name-input');
  const msgEl  = document.getElementById('message-input');
  const name = nameEl.value.trim();
  const message = msgEl.value.trim();
  if (!name)    { nameEl.focus(); nameEl.style.borderColor='#e05555'; return; }
  nameEl.style.borderColor = '';
  if (!message) { msgEl.focus(); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const params = new URLSearchParams({
      action: 'post',
      name: isTeacher ? (teacherWho === 'nargiza' ? 'Miss Nargiza' : 'Mr Paul') : name,
      message,
      isTeacher: isTeacher ? 'TRUE' : 'FALSE'
    });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    const data = await res.json();
    if (data.success) {
      msgEl.value = ''; msgEl.style.height = 'auto';
      lastCount = 0;
      await fetchMessages();
      scrollToBottom();
    }
  } catch(e) {
    alert('Could not send. Check your internet connection.');
  }
  btn.disabled = false; btn.textContent = '➤';
}

fetchMessages();
setInterval(fetchMessages, REFRESH_MS);
</script>
</body>
</html>
