<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Nouns Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f0f8;
    --card: #ffffff;
    --ink: #1e1b2e;
    --muted: #7c7291;
    --accent: #6d28d9;
    --accent2: #0e7490;
    --rose: #be185d;
    --gold: #b45309;
    --border: #e4dff0;
    --shadow: rgba(30,27,46,0.10);
    --green: #0e7490;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    background-image:
      radial-gradient(circle at 10% 80%, rgba(109,40,217,0.07) 0%, transparent 50%),
      radial-gradient(circle at 90% 15%, rgba(14,116,144,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: -1.5px;
    color: var(--ink);
  }

  header h1 em { font-style: italic; color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 0.92rem;
    margin-top: 8px;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 0 10px;
    text-align: center;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 640px;
  }

  .pill {
    padding: 7px 18px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: white; }

  .card-wrap {
    width: 100%;
    max-width: 560px;
    margin: 26px 0 18px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 52px 40px 44px;
    text-align: center;
    position: relative;
    height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px var(--shadow);
    transition: box-shadow 0.2s;
    overflow: hidden;
  }

  .card:hover { box-shadow: 0 12px 50px var(--shadow); }

  .cat-badge {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    white-space: nowrap;
    background: rgba(109,40,217,0.1);
    color: var(--accent);
    border: 1px solid rgba(109,40,217,0.2);
  }

  .cat-home    { background: rgba(180,83,9,0.1);   color: var(--gold);   border: 1px solid rgba(180,83,9,0.2); }
  .cat-out     { background: rgba(14,116,144,0.1); color: var(--green);  border: 1px solid rgba(14,116,144,0.2); }
  .cat-food    { background: rgba(190,24,93,0.1);  color: var(--rose);   border: 1px solid rgba(190,24,93,0.2); }
  .cat-life    { background: rgba(109,40,217,0.1); color: var(--accent); border: 1px solid rgba(109,40,217,0.2); }

  .card-counter {
    position: absolute;
    top: 22px;
    right: 24px;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
  }

  .noun-article {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 400;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .noun-display {
    font-family: 'Fraunces', serif;
    font-size: 3.4rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .noun-gender {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
  }

  .gender-m { color: var(--accent2); }
  .gender-f { color: var(--rose); }

  .answer-block {
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1.5px solid var(--border);
    width: 100%;
    animation: rise 0.3s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .answer-english {
    font-family: 'Fraunces', serif;
    font-size: 2.1rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .answer-note {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 560px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    padding: 15px 18px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    border: none;
    min-width: 110px;
  }

  .btn-reveal {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 16px rgba(109,40,217,0.3);
  }

  .btn-reveal:hover { background: #5b21b6; transform: translateY(-1px); }

  .btn-next {
    background: white;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }

  .btn-next:hover { border-color: var(--ink); transform: translateY(-1px); }

  .btn-shuffle {
    background: white;
    color: var(--gold);
    border: 1.5px solid rgba(180,83,9,0.25);
    flex: 0 0 auto;
  }

  .btn-shuffle:hover { background: rgba(180,83,9,0.05); }

  .hidden { display: none !important; }

  .scorebar {
    display: flex;
    gap: 20px;
    margin: 18px 0 0;
    font-size: 0.88rem;
    color: var(--muted);
    font-weight: 500;
  }

  .scorebar strong { color: var(--ink); font-size: 1rem; }

  .prog-wrap {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    margin: 14px 0 0;
    overflow: hidden;
  }

  .prog-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .ref-toggle {
    margin-top: 26px;
    font-size: 0.82rem;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-align: center;
  }

  .ref-table {
    max-width: 560px;
    width: 100%;
    margin-top: 14px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: white;
    font-size: 0.85rem;
  }

  .ref-table table { width: 100%; border-collapse: collapse; }

  .ref-table th {
    background: var(--bg);
    padding: 10px 14px;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .ref-table td {
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    color: var(--ink);
  }

  .ref-table td:first-child {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
  }

  .ref-table tr:hover td { background: var(--bg); }

  .tag-m { color: var(--accent2); font-size: 0.75rem; font-weight: 600; }
  .tag-f { color: var(--rose);    font-size: 0.75rem; font-weight: 600; }

</style>
</head>
<body>

<header>
  <h1><em>Noun</em> Drill</h1>
  <p>See the Spanish — recall the English — <strong>Spacebar</strong> to reveal &amp; advance</p>
</header>

<div class="section-label">Filter by category</div>
<div class="filter-row" id="cat-filters">
  <button class="pill active" onclick="setFilter('all', this)">All</button>
  <button class="pill" onclick="setFilter('home', this)">🏠 Home &amp; Daily</button>
  <button class="pill" onclick="setFilter('out', this)">🌍 Out &amp; About</button>
  <button class="pill" onclick="setFilter('food', this)">🍽️ Food &amp; Drink</button>
  <button class="pill" onclick="setFilter('life', this)">😄 Enjoyable</button>
</div>

<div class="card-wrap">
  <div class="card" id="card">
    <div class="cat-badge cat-life" id="cat-badge">ENJOYABLE</div>
    <div class="card-counter" id="counter">1 / 30</div>
    <div class="noun-article" id="noun-article">el</div>
    <div class="noun-display" id="noun-display">—</div>
    <div class="noun-gender" id="noun-gender"></div>
    <div class="answer-block hidden" id="answer-block">
      <div class="answer-english" id="ans-english">—</div>
      <div class="answer-note" id="ans-note"></div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-reveal" id="revealBtn" onclick="reveal()">👁 Reveal</button>
  <button class="btn btn-next hidden" id="nextBtn" onclick="next()">→ Next</button>
  <button class="btn btn-shuffle" onclick="reshuffle()">⟳ Shuffle</button>
</div>

<div class="scorebar">
  <div>Seen: <strong id="s-seen">0</strong></div>
  <div>Remaining: <strong id="s-left">—</strong></div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>

<div class="ref-toggle" onclick="toggleRef()">📋 Show / hide full reference table</div>
<div class="ref-table hidden" id="ref-table">
  <table>
    <thead><tr><th>Spanish</th><th>Gender</th><th>English</th><th>Category</th><th>Note</th></tr></thead>
    <tbody id="ref-body"></tbody>
  </table>
</div>

<script>
// article, word, gender (m/f), category, English, optional note
const nouns = [
  // Home & Daily
  { art:"la",  word:"cama",        g:"f", cat:"home", en:"bed",            note:"" },
  { art:"la",  word:"ducha",       g:"f", cat:"home", en:"shower",         note:"" },
  { art:"la",  word:"cocina",      g:"f", cat:"home", en:"kitchen",        note:"" },
  { art:"la",  word:"ventana",     g:"f", cat:"home", en:"window",         note:"" },
  { art:"la",  word:"llave",       g:"f", cat:"home", en:"key",            note:"" },
  { art:"el",  word:"ruido",       g:"m", cat:"home", en:"noise",          note:"¡Qué ruido! = What a noise!" },
  { art:"la",  word:"basura",      g:"f", cat:"home", en:"rubbish / trash",note:"" },
  { art:"el",  word:"vecino",      g:"m", cat:"home", en:"neighbour",      note:"la vecina = female neighbour" },
  // Out & About
  { art:"el",  word:"semáforo",    g:"m", cat:"out",  en:"traffic light",  note:"" },
  { art:"la",  word:"esquina",     g:"f", cat:"out",  en:"corner of a street", note:"a la vuelta de la esquina = around the corner" },
  { art:"el",  word:"banco",       g:"m", cat:"out",  en:"bank / bench",   note:"Double meaning! Context tells you which" },
  { art:"el",  word:"mercado",     g:"m", cat:"out",  en:"market",         note:"" },
  { art:"la",  word:"farmacia",    g:"f", cat:"out",  en:"pharmacy",       note:"Look for the green cross sign" },
  { art:"el",  word:"médico",      g:"m", cat:"out",  en:"doctor",         note:"la médica = female doctor" },
  { art:"el",  word:"autobús",     g:"m", cat:"out",  en:"bus",            note:"" },
  { art:"el",  word:"billete",     g:"m", cat:"out",  en:"ticket / banknote", note:"Double meaning — ticket or money" },
  // Food & Drink
  { art:"el",  word:"desayuno",    g:"m", cat:"food", en:"breakfast",      note:"" },
  { art:"el",  word:"almuerzo",    g:"m", cat:"food", en:"lunch",          note:"" },
  { art:"la",  word:"cena",        g:"f", cat:"food", en:"dinner",         note:"" },
  { art:"la",  word:"cerveza",     g:"f", cat:"food", en:"beer",           note:"una cerveza, por favor — essential! 😄" },
  { art:"el",  word:"vino",        g:"m", cat:"food", en:"wine",           note:"tinto = red, blanco = white" },
  // Enjoyable / Life
  { art:"el",  word:"sueño",       g:"m", cat:"life", en:"dream / sleep",  note:"tengo sueño = I am sleepy" },
  { art:"la",  word:"música",      g:"f", cat:"life", en:"music",          note:"" },
  { art:"el",  word:"partido",     g:"m", cat:"life", en:"match / game",   note:"el partido de fútbol = the football match" },
  { art:"la",  word:"playa",       g:"f", cat:"life", en:"beach",          note:"" },
  { art:"el",  word:"sol",         g:"m", cat:"life", en:"sun",            note:"hace sol = it's sunny" },
  { art:"la",  word:"montaña",     g:"f", cat:"life", en:"mountain",       note:"" },
  { art:"la",  word:"risa",        g:"f", cat:"life", en:"laughter",       note:"la risa es contagiosa = laughter is contagious" },
  { art:"el",  word:"recuerdo",    g:"m", cat:"life", en:"memory / souvenir", note:"Double meaning — a memory or a souvenir" },
  { art:"la",  word:"suerte",      g:"f", cat:"life", en:"luck",           note:"¡Buena suerte! = Good luck!" },
];

const catLabels = { home:"HOME & DAILY", out:"OUT & ABOUT", food:"FOOD & DRINK", life:"ENJOYABLE" };
const catClass  = { home:"cat-home", out:"cat-out", food:"cat-food", life:"cat-life" };

let filterCat = "all";
let deck = [];
let idx = 0;
let seen = 0;
let revealed = false;

function buildDeck() {
  deck = filterCat === "all"
    ? [...nouns]
    : nouns.filter(n => n.cat === filterCat);
  deck = deck.sort(() => Math.random() - 0.5);
  idx = 0; seen = 0; revealed = false;
  updateScore();
  showCard();
}

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  const n = deck[idx];

  const badge = document.getElementById('cat-badge');
  badge.textContent = catLabels[n.cat];
  badge.className = "cat-badge " + catClass[n.cat];

  document.getElementById('noun-article').textContent = n.art;
  document.getElementById('noun-display').textContent = n.word;
  document.getElementById('noun-gender').innerHTML = n.g === "m"
    ? '<span class="gender-m">masculine (el / un)</span>'
    : '<span class="gender-f">feminine (la / una)</span>';
  document.getElementById('counter').textContent = `${idx+1} / ${deck.length}`;

  document.getElementById('answer-block').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = (idx / deck.length * 100) + '%';
  revealed = false;
}

function reveal() {
  const n = deck[idx];
  document.getElementById('ans-english').textContent = n.en;
  document.getElementById('ans-note').textContent = n.note;
  document.getElementById('answer-block').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  if (!revealed) { seen++; updateScore(); revealed = true; }
}

function next() { idx++; showCard(); }

function reshuffle() { buildDeck(); }

function updateScore() {
  document.getElementById('s-seen').textContent = seen;
  document.getElementById('s-left').textContent = Math.max(0, deck.length - idx);
}

function setFilter(cat, btn) {
  filterCat = cat;
  document.querySelectorAll('#cat-filters .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildDeck();
}

function showDone() {
  document.getElementById('card').innerHTML = `
    <div style="text-align:center;padding:20px">
      <div style="font-size:2.8rem;margin-bottom:12px">🎉</div>
      <div style="font-family:'Fraunces',serif;font-size:2rem;font-weight:900;letter-spacing:-1px;margin-bottom:10px">¡Excelente!</div>
      <div style="color:var(--muted);font-size:0.95rem;">All ${deck.length} nouns done!<br>Click Shuffle to go again.</div>
    </div>`;
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = '100%';
}

function toggleRef() {
  document.getElementById('ref-table').classList.toggle('hidden');
}

// Build reference table
const catNames = { home:"🏠 Home", out:"🌍 Out", food:"🍽️ Food", life:"😄 Life" };
nouns.forEach(n => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${n.art} ${n.word}</td>
    <td>${n.g === "m" ? '<span class="tag-m">masc.</span>' : '<span class="tag-f">fem.</span>'}</td>
    <td>${n.en}</td>
    <td style="font-size:0.8rem;color:var(--muted)">${catNames[n.cat]}</td>
    <td style="font-size:0.78rem;color:var(--muted);font-style:italic">${n.note}</td>`;
  document.getElementById('ref-body').appendChild(tr);
});

// Spacebar
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (!revealed) reveal();
    else next();
  }
});

buildDeck();
</script>
</body>
</html>
