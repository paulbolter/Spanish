<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Vocab Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --text: #eaeaea;
    --muted: #8892a4;
    --green: #2ecc71;
    --border: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(233,69,96,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(245,166,35,0.06) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 6px;
    font-weight: 300;
  }

  /* Category filter */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    max-width: 700px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Score bar */
  .scorebar {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 600;
  }

  .scorebar span { color: var(--text); font-size: 1.1rem; }
  .score-correct span { color: var(--green); }
  .score-wrong span { color: var(--accent); }

  /* Main card */
  .card-wrap {
    width: 100%;
    max-width: 560px;
    perspective: 1000px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 50px 40px;
    text-align: center;
    position: relative;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: transform 0.15s ease;
  }

  .card:hover { transform: translateY(-2px); }

  .category-tag {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.25);
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .counter {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
  }

  .spanish-word {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .hint {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 4px;
  }

  .answer-reveal {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .answer-reveal .english {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--green);
    font-weight: 700;
  }

  .answer-reveal .example {
    font-size: 0.88rem;
    color: var(--muted);
    margin-top: 10px;
    font-style: italic;
    line-height: 1.5;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 560px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    padding: 16px 20px;
    border: none;
    border-radius: 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-reveal {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 20px rgba(233,69,96,0.35);
  }

  .btn-reveal:hover { background: #ff6b85; transform: translateY(-1px); }

  .btn-next {
    background: rgba(255,255,255,0.07);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-next:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }

  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-shuffle {
    background: rgba(245,166,35,0.12);
    color: var(--gold);
    border: 1px solid rgba(245,166,35,0.25);
    flex: 0 0 auto;
    padding: 16px 20px;
  }

  .btn-shuffle:hover { background: rgba(245,166,35,0.2); }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 560px;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .done-screen {
    text-align: center;
    padding: 40px;
  }

  .done-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin-bottom: 12px;
  }

  .done-screen p { color: var(--muted); margin-bottom: 24px; }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>¡Español! <span>Flash</span>cards</h1>
  <p>See the Spanish — recall the English — reveal to check</p>
</header>

<div class="filters" id="filters"></div>

<div class="scorebar">
  <div>Seen: <span id="seen">0</span></div>
  <div class="score-correct">✓ Got it: <span id="correct">0</span></div>
  <div class="score-wrong">✗ Missed: <span id="wrong">0</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progress" style="width:0%"></div>
</div>

<div class="card-wrap">
  <div class="card" id="card">
    <div class="category-tag" id="cat-tag">—</div>
    <div class="counter" id="counter">1 / 120</div>
    <div class="spanish-word" id="spanish">—</div>
    <div class="hint" id="hint"></div>
    <div class="answer-reveal hidden" id="answer">
      <div class="english" id="english">—</div>
      <div class="example" id="example"></div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-reveal" id="revealBtn" onclick="revealAnswer()">👁 Reveal Answer</button>
  <button class="btn btn-next hidden" id="gotItBtn" onclick="markAndNext(true)">✓ Got it</button>
  <button class="btn btn-next hidden" id="missedBtn" onclick="markAndNext(false)">✗ Missed</button>
  <button class="btn btn-shuffle" onclick="shuffle()">⟳ Shuffle</button>
</div>

<script>
const vocab = [
  // Greetings
  { es: "Hola", en: "Hello", cat: "Greetings" },
  { es: "Buenos días", en: "Good morning", cat: "Greetings" },
  { es: "Buenas tardes", en: "Good afternoon", cat: "Greetings" },
  { es: "Buenas noches", en: "Good evening / night", cat: "Greetings" },
  { es: "¿Cómo estás?", en: "How are you?", cat: "Greetings" },
  { es: "Bien, gracias", en: "Fine, thank you", cat: "Greetings" },
  { es: "Por favor", en: "Please", cat: "Greetings" },
  { es: "Gracias", en: "Thank you", cat: "Greetings" },
  { es: "De nada", en: "You're welcome", cat: "Greetings" },
  { es: "Lo siento", en: "I'm sorry", cat: "Greetings" },
  { es: "Perdón", en: "Excuse me", cat: "Greetings" },
  { es: "¿Cómo te llamas?", en: "What's your name?", cat: "Greetings" },
  { es: "Me llamo...", en: "My name is...", cat: "Greetings" },
  { es: "Mucho gusto", en: "Nice to meet you", cat: "Greetings" },
  { es: "Adiós / Hasta luego", en: "Goodbye / See you later", cat: "Greetings" },
  // Verbs
  { es: "ser / estar", en: "to be (permanent / temporary)", cat: "Verbs", hint: "Two different 'to be' verbs!" },
  { es: "tener", en: "to have", cat: "Verbs" },
  { es: "hacer", en: "to do / make", cat: "Verbs" },
  { es: "ir", en: "to go", cat: "Verbs" },
  { es: "venir", en: "to come", cat: "Verbs" },
  { es: "querer", en: "to want", cat: "Verbs" },
  { es: "poder", en: "to be able to / can", cat: "Verbs" },
  { es: "deber", en: "to must / should", cat: "Verbs" },
  { es: "necesitar", en: "to need", cat: "Verbs" },
  { es: "saber", en: "to know (a fact)", cat: "Verbs" },
  { es: "conocer", en: "to know (a person/place)", cat: "Verbs" },
  { es: "hablar", en: "to speak", cat: "Verbs" },
  { es: "comer", en: "to eat", cat: "Verbs" },
  { es: "beber", en: "to drink", cat: "Verbs" },
  { es: "vivir", en: "to live", cat: "Verbs" },
  { es: "trabajar", en: "to work", cat: "Verbs" },
  { es: "comprar", en: "to buy", cat: "Verbs" },
  { es: "ver", en: "to see / watch", cat: "Verbs" },
  { es: "escuchar", en: "to listen", cat: "Verbs" },
  { es: "leer", en: "to read", cat: "Verbs" },
  { es: "escribir", en: "to write", cat: "Verbs" },
  { es: "pensar", en: "to think", cat: "Verbs" },
  { es: "llamar", en: "to call", cat: "Verbs" },
  { es: "dar", en: "to give", cat: "Verbs" },
  { es: "poner", en: "to put", cat: "Verbs" },
  // Modals
  { es: "Puedo...", en: "I can...", cat: "Modals" },
  { es: "No puedo...", en: "I can't...", cat: "Modals" },
  { es: "Quiero...", en: "I want...", cat: "Modals" },
  { es: "Necesito...", en: "I need...", cat: "Modals" },
  { es: "Debo...", en: "I must / should...", cat: "Modals" },
  { es: "Me gustaría...", en: "I would like...", cat: "Modals" },
  { es: "¿Puedes...?", en: "Can you...?", cat: "Modals" },
  { es: "Hay que...", en: "One must / You have to...", cat: "Modals" },
  { es: "Voy a...", en: "I'm going to...", cat: "Modals" },
  { es: "Tengo que...", en: "I have to...", cat: "Modals" },
  // Questions
  { es: "¿Qué?", en: "What?", cat: "Questions" },
  { es: "¿Quién?", en: "Who?", cat: "Questions" },
  { es: "¿Dónde?", en: "Where?", cat: "Questions" },
  { es: "¿Cuándo?", en: "When?", cat: "Questions" },
  { es: "¿Cómo?", en: "How?", cat: "Questions" },
  { es: "¿Por qué?", en: "Why?", cat: "Questions" },
  { es: "¿Cuánto/a?", en: "How much?", cat: "Questions" },
  { es: "¿Cuál?", en: "Which?", cat: "Questions" },
  // Nouns
  { es: "el agua", en: "water", cat: "Nouns" },
  { es: "la comida", en: "food", cat: "Nouns" },
  { es: "la casa", en: "house", cat: "Nouns" },
  { es: "la calle", en: "street", cat: "Nouns" },
  { es: "el trabajo", en: "work", cat: "Nouns" },
  { es: "el dinero", en: "money", cat: "Nouns" },
  { es: "el tiempo", en: "time / weather", cat: "Nouns" },
  { es: "el día", en: "day", cat: "Nouns" },
  { es: "la noche", en: "night", cat: "Nouns" },
  { es: "la persona", en: "person", cat: "Nouns" },
  { es: "el hombre / la mujer", en: "man / woman", cat: "Nouns" },
  { es: "el niño / la niña", en: "boy / girl", cat: "Nouns" },
  { es: "la ciudad", en: "city", cat: "Nouns" },
  { es: "el país", en: "country", cat: "Nouns" },
  { es: "la tienda", en: "shop / store", cat: "Nouns" },
  { es: "el baño", en: "bathroom", cat: "Nouns" },
  { es: "la mesa", en: "table", cat: "Nouns" },
  { es: "el libro", en: "book", cat: "Nouns" },
  { es: "el teléfono", en: "phone", cat: "Nouns" },
  { es: "el nombre", en: "name", cat: "Nouns" },
  { es: "la familia", en: "family", cat: "Nouns" },
  { es: "el amigo / la amiga", en: "friend", cat: "Nouns" },
  { es: "el problema", en: "problem", cat: "Nouns" },
  { es: "la pregunta", en: "question", cat: "Nouns" },
  { es: "la respuesta", en: "answer", cat: "Nouns" },
  // Adjectives
  { es: "bueno/a", en: "good", cat: "Adjectives" },
  { es: "malo/a", en: "bad", cat: "Adjectives" },
  { es: "grande", en: "big", cat: "Adjectives" },
  { es: "pequeño/a", en: "small", cat: "Adjectives" },
  { es: "mucho/a", en: "a lot / many", cat: "Adjectives" },
  { es: "poco/a", en: "a little / few", cat: "Adjectives" },
  { es: "nuevo/a", en: "new", cat: "Adjectives" },
  { es: "viejo/a", en: "old", cat: "Adjectives" },
  { es: "fácil", en: "easy", cat: "Adjectives" },
  { es: "difícil", en: "difficult", cat: "Adjectives" },
  { es: "rápido/a", en: "fast", cat: "Adjectives" },
  { es: "lento/a", en: "slow", cat: "Adjectives" },
  { es: "bonito/a", en: "pretty / nice", cat: "Adjectives" },
  { es: "importante", en: "important", cat: "Adjectives" },
  { es: "diferente", en: "different", cat: "Adjectives" },
  // Connectors
  { es: "y", en: "and", cat: "Connectors" },
  { es: "o", en: "or", cat: "Connectors" },
  { es: "pero", en: "but", cat: "Connectors" },
  { es: "porque", en: "because", cat: "Connectors" },
  { es: "si", en: "if", cat: "Connectors" },
  { es: "también", en: "also", cat: "Connectors" },
  { es: "nunca", en: "never", cat: "Connectors" },
  { es: "siempre", en: "always", cat: "Connectors" },
  { es: "aquí / allí", en: "here / there", cat: "Connectors" },
  { es: "con / sin", en: "with / without", cat: "Connectors" },
  { es: "para / por", en: "for / because of", cat: "Connectors" },
  { es: "antes / después", en: "before / after", cat: "Connectors" },
  // Time & Numbers
  { es: "uno, dos, tres...", en: "one, two, three...", cat: "Time & Numbers" },
  { es: "cien", en: "one hundred", cat: "Time & Numbers" },
  { es: "hoy", en: "today", cat: "Time & Numbers" },
  { es: "mañana", en: "tomorrow", cat: "Time & Numbers" },
  { es: "ayer", en: "yesterday", cat: "Time & Numbers" },
  { es: "ahora", en: "now", cat: "Time & Numbers" },
  { es: "más tarde", en: "later", cat: "Time & Numbers" },
  { es: "¿Qué hora es?", en: "What time is it?", cat: "Time & Numbers" },
  { es: "la semana", en: "the week", cat: "Time & Numbers" },
  { es: "el año", en: "the year", cat: "Time & Numbers" },
];

const categories = ["All", ...new Set(vocab.map(v => v.cat))];
let activeCategory = "All";
let deck = [];
let index = 0;
let seen = 0, correct = 0, wrong = 0;
let revealed = false;

function buildFilters() {
  const wrap = document.getElementById('filters');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      resetDeck();
    };
    wrap.appendChild(btn);
  });
}

function resetDeck() {
  const filtered = activeCategory === 'All' ? vocab : vocab.filter(v => v.cat === activeCategory);
  deck = [...filtered].sort(() => Math.random() - 0.5);
  index = 0; seen = 0; correct = 0; wrong = 0;
  updateScore();
  showCard();
}

function shuffle() {
  deck = deck.sort(() => Math.random() - 0.5);
  index = 0; seen = 0; correct = 0; wrong = 0;
  updateScore();
  showCard();
}

function showCard() {
  if (index >= deck.length) {
    showDone(); return;
  }
  const item = deck[index];
  document.getElementById('spanish').textContent = item.es;
  document.getElementById('cat-tag').textContent = item.cat;
  document.getElementById('hint').textContent = item.hint || '';
  document.getElementById('english').textContent = item.en;
  document.getElementById('counter').textContent = `${index + 1} / ${deck.length}`;
  document.getElementById('answer').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('gotItBtn').classList.add('hidden');
  document.getElementById('missedBtn').classList.add('hidden');
  document.getElementById('progress').style.width = (index / deck.length * 100) + '%';
  revealed = false;
}

function revealAnswer() {
  document.getElementById('answer').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('gotItBtn').classList.remove('hidden');
  document.getElementById('missedBtn').classList.remove('hidden');
  if (!revealed) { seen++; updateScore(); revealed = true; }
}

function markAndNext(gotIt) {
  if (gotIt) correct++; else wrong++;
  index++;
  updateScore();
  showCard();
}

function updateScore() {
  document.getElementById('seen').textContent = seen;
  document.getElementById('correct').textContent = correct;
  document.getElementById('wrong').textContent = wrong;
}

function showDone() {
  document.getElementById('card').innerHTML = `
    <div class="done-screen">
      <h2>¡Bien hecho! 🎉</h2>
      <p>You completed the deck!</p>
      <p style="font-size:1.3rem; margin-bottom:6px;">✓ Got it: <strong style="color:var(--green)">${correct}</strong> &nbsp; ✗ Missed: <strong style="color:var(--accent)">${wrong}</strong></p>
      <p style="color:var(--muted); font-size:0.9rem;">Click Shuffle to go again</p>
    </div>`;
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('gotItBtn').classList.add('hidden');
  document.getElementById('missedBtn').classList.add('hidden');
  document.getElementById('progress').style.width = '100%';
}

buildFilters();
resetDeck();
</script>
</body>
</html>
