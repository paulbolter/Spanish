<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Adjectives Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --ink: #1a202c;
    --muted: #718096;
    --accent: #2b6cb0;
    --accent2: #276749;
    --rose: #c53030;
    --gold: #b7791f;
    --border: #e2e8f0;
    --shadow: rgba(26,32,44,0.10);
    --green: #276749;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    background-image:
      radial-gradient(circle at 15% 85%, rgba(43,108,176,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 15%, rgba(39,103,73,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: -1.5px;
    color: var(--ink);
  }

  header h1 em { font-style: italic; color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 0.92rem;
    margin-top: 8px;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 0 10px;
    text-align: center;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 600px;
  }

  .pill {
    padding: 7px 18px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Card */
  .card-wrap {
    width: 100%;
    max-width: 560px;
    margin: 26px 0 18px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 52px 40px 44px;
    text-align: center;
    position: relative;
    height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px var(--shadow);
    transition: box-shadow 0.2s;
    overflow: hidden;
  }

  .card:hover { box-shadow: 0 12px 50px var(--shadow); }

  .gender-badge {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .badge-m {
    background: rgba(43,108,176,0.1);
    color: var(--accent);
    border: 1px solid rgba(43,108,176,0.25);
  }

  .badge-f {
    background: rgba(197,48,48,0.1);
    color: var(--rose);
    border: 1px solid rgba(197,48,48,0.25);
  }

  .badge-both {
    background: rgba(183,121,31,0.1);
    color: var(--gold);
    border: 1px solid rgba(183,121,31,0.25);
  }

  .card-counter {
    position: absolute;
    top: 22px;
    right: 24px;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
  }

  .adj-display {
    font-family: 'Fraunces', serif;
    font-size: 3.8rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .adj-note {
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
  }

  .answer-block {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1.5px solid var(--border);
    width: 100%;
    animation: rise 0.3s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .answer-english {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -1px;
  }

  .answer-detail {
    margin-top: 10px;
    font-size: 0.83rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .no-change-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(39,103,73,0.1);
    color: var(--green);
    border: 1px solid rgba(39,103,73,0.25);
    border-radius: 6px;
    padding: 2px 8px;
    margin-top: 6px;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 560px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    padding: 15px 18px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    border: none;
    min-width: 110px;
  }

  .btn-reveal {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 16px rgba(43,108,176,0.3);
  }

  .btn-reveal:hover { background: #2c5282; transform: translateY(-1px); }

  .btn-next {
    background: white;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }

  .btn-next:hover { border-color: var(--ink); transform: translateY(-1px); }

  .btn-shuffle {
    background: white;
    color: var(--gold);
    border: 1.5px solid rgba(183,121,31,0.3);
    flex: 0 0 auto;
  }

  .btn-shuffle:hover { background: rgba(183,121,31,0.06); }

  .hidden { display: none !important; }

  .scorebar {
    display: flex;
    gap: 20px;
    margin: 18px 0 0;
    font-size: 0.88rem;
    color: var(--muted);
    font-weight: 500;
  }

  .scorebar strong { color: var(--ink); font-size: 1rem; }

  .prog-wrap {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    margin: 14px 0 0;
    overflow: hidden;
  }

  .prog-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .ref-toggle {
    margin-top: 26px;
    font-size: 0.82rem;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-align: center;
  }

  .ref-table {
    max-width: 560px;
    width: 100%;
    margin-top: 14px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: white;
    font-size: 0.85rem;
  }

  .ref-table table { width: 100%; border-collapse: collapse; }

  .ref-table th {
    background: var(--bg);
    padding: 10px 14px;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .ref-table td {
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    color: var(--ink);
  }

  .ref-table td:first-child {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }

  .ref-table td:nth-child(2) {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--rose);
  }

  .ref-table tr:hover td { background: var(--bg); }

  .same-tag { font-size: 0.7rem; color: var(--green); font-style: italic; }
</style>
</head>
<body>

<header>
  <h1><em>Adjective</em> Drill</h1>
  <p>See the Spanish — recall the English — <strong>Spacebar</strong> to reveal &amp; advance</p>
</header>

<div class="section-label">Show me</div>
<div class="filter-row">
  <button class="pill active" onclick="setFilter('both', this)">Both genders mixed</button>
  <button class="pill" onclick="setFilter('m', this)">Masculine only</button>
  <button class="pill" onclick="setFilter('f', this)">Feminine only</button>
</div>

<div class="card-wrap">
  <div class="card" id="card">
    <div class="gender-badge badge-both" id="g-badge">MASCULINE / FEMININE</div>
    <div class="card-counter" id="counter">1 / 20</div>
    <div class="adj-display" id="adj-display">—</div>
    <div class="adj-note" id="adj-note"></div>
    <div class="answer-block hidden" id="answer-block">
      <div class="answer-english" id="ans-english">—</div>
      <div class="answer-detail" id="ans-detail"></div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-reveal" id="revealBtn" onclick="reveal()">👁 Reveal</button>
  <button class="btn btn-next hidden" id="nextBtn" onclick="next()">→ Next</button>
  <button class="btn btn-shuffle" onclick="reshuffle()">⟳ Shuffle</button>
</div>

<div class="scorebar">
  <div>Seen: <strong id="s-seen">0</strong></div>
  <div>Remaining: <strong id="s-left">—</strong></div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>

<div class="ref-toggle" onclick="toggleRef()">📋 Show / hide full reference table</div>
<div class="ref-table hidden" id="ref-table">
  <table>
    <thead><tr><th>Masculine</th><th>Feminine</th><th>English</th><th>Note</th></tr></thead>
    <tbody id="ref-body"></tbody>
  </table>
</div>

<script>
const adjectives = [
  { m:"bueno",       f:"buena",       en:"good",          changes:true  },
  { m:"malo",        f:"mala",        en:"bad",           changes:true  },
  { m:"grande",      f:"grande",      en:"big",           changes:false },
  { m:"pequeño",     f:"pequeña",     en:"small",         changes:true  },
  { m:"nuevo",       f:"nueva",       en:"new",           changes:true  },
  { m:"viejo",       f:"vieja",       en:"old",           changes:true  },
  { m:"bonito",      f:"bonita",      en:"pretty / nice", changes:true  },
  { m:"feo",         f:"fea",         en:"ugly",          changes:true  },
  { m:"rápido",      f:"rápida",      en:"fast",          changes:true  },
  { m:"lento",       f:"lenta",       en:"slow",          changes:true  },
  { m:"fácil",       f:"fácil",       en:"easy",          changes:false },
  { m:"difícil",     f:"difícil",     en:"difficult",     changes:false },
  { m:"importante",  f:"importante",  en:"important",     changes:false },
  { m:"interesante", f:"interesante", en:"interesting",   changes:false },
  { m:"aburrido",    f:"aburrida",    en:"boring",        changes:true  },
  { m:"cansado",     f:"cansada",     en:"tired",         changes:true  },
  { m:"feliz",       f:"feliz",       en:"happy",         changes:false },
  { m:"triste",      f:"triste",      en:"sad",           changes:false },
  { m:"simpático",   f:"simpática",   en:"friendly / nice", changes:true },
  { m:"inteligente", f:"inteligente", en:"intelligent",   changes:false },
];

let filterMode = "both"; // "both", "m", "f"
let deck = [];
let idx = 0;
let seen = 0;
let revealed = false;

function buildDeck() {
  deck = [];
  adjectives.forEach(adj => {
    if (filterMode === "both") {
      // show masculine and feminine separately if they differ, or just once if same
      deck.push({ adj, gender: "m" });
      if (adj.changes) deck.push({ adj, gender: "f" });
    } else {
      deck.push({ adj, gender: filterMode });
    }
  });
  deck = deck.sort(() => Math.random() - 0.5);
  idx = 0; seen = 0; revealed = false;
  updateScore();
  showCard();
}

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  const { adj, gender } = deck[idx];
  const word = gender === "m" ? adj.m : adj.f;

  const badge = document.getElementById('g-badge');
  if (filterMode === "both" && !adj.changes) {
    badge.textContent = "MASC. & FEM. — same form";
    badge.className = "gender-badge badge-both";
  } else if (gender === "m") {
    badge.textContent = "MASCULINE (el / un)";
    badge.className = "gender-badge badge-m";
  } else {
    badge.textContent = "FEMININE (la / una)";
    badge.className = "gender-badge badge-f";
  }

  document.getElementById('adj-display').textContent = word;
  document.getElementById('adj-note').textContent = (!adj.changes) ? "no gender change for this one" : "";
  document.getElementById('counter').textContent = `${idx+1} / ${deck.length}`;
  document.getElementById('answer-block').classList.add('hidden');
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = (idx / deck.length * 100) + '%';
  revealed = false;
}

function reveal() {
  const { adj, gender } = deck[idx];
  document.getElementById('ans-english').textContent = adj.en;

  let detail = "";
  if (!adj.changes) {
    detail = `<span class="no-change-tag">✓ same for masc. & fem.</span><br><em style="font-size:0.82rem">Both: ${adj.m}</em>`;
  } else {
    detail = `Masc: <strong>${adj.m}</strong> &nbsp;|&nbsp; Fem: <strong>${adj.f}</strong>`;
  }
  document.getElementById('ans-detail').innerHTML = detail;
  document.getElementById('answer-block').classList.remove('hidden');
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  if (!revealed) { seen++; updateScore(); revealed = true; }
}

function next() { idx++; showCard(); }

function reshuffle() { buildDeck(); }

function updateScore() {
  document.getElementById('s-seen').textContent = seen;
  document.getElementById('s-left').textContent = Math.max(0, deck.length - idx);
}

function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildDeck();
}

function showDone() {
  document.getElementById('card').innerHTML = `
    <div style="text-align:center;padding:20px">
      <div style="font-size:2.8rem;margin-bottom:12px">🎉</div>
      <div style="font-family:'Fraunces',serif;font-size:2rem;font-weight:900;letter-spacing:-1px;margin-bottom:10px">¡Muy bien!</div>
      <div style="color:var(--muted);font-size:0.95rem;">All ${deck.length} cards done!<br>Click Shuffle to go again.</div>
    </div>`;
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('prog').style.width = '100%';
}

function toggleRef() {
  document.getElementById('ref-table').classList.toggle('hidden');
}

// Build reference table
adjectives.forEach(adj => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${adj.m}</td>
    <td>${adj.f}</td>
    <td>${adj.en}</td>
    <td>${!adj.changes ? '<span class="same-tag">same form</span>' : '-o / -a'}</td>`;
  document.getElementById('ref-body').appendChild(tr);
});

buildDeck();

// Spacebar: reveal if not revealed, next if revealed
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (!revealed) {
      reveal();
    } else {
      next();
    }
  }
});
</script>
</body>
</html>
