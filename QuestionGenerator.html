<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1923;
    --card: #1a2535;
    --border: #2a3545;
    --gold: #f0c040;
    --gold2: #ffd770;
    --text: #e8e8e8;
    --muted: #7a8a9a;

    --c1: #7ec8e3; /* Remember */
    --c2: #6dbf8a; /* Understand */
    --c3: #f0a070; /* Apply */
    --c4: #c084d4; /* Analyse */
    --c5: #e07070; /* Evaluate */
    --c6: #f0c040; /* Create */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--gold);
  }

  header p {
    color: var(--muted);
    margin-top: 6px;
    font-size: 0.95rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 680px;
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 18px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--gold); }

  button#generateBtn {
    padding: 14px 24px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  button#generateBtn:hover { background: var(--gold2); }
  button#generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    font-size: 0.88rem;
    color: var(--muted);
    min-height: 22px;
    margin-bottom: 12px;
  }

  .questions-list {
    display: none;
    flex-direction: column;
    gap: 14px;
    margin-top: 8px;
  }

  .questions-list.visible {
    display: flex;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-item {
    border-radius: 12px;
    padding: 16px 18px;
    border-left: 4px solid;
    background: rgba(255,255,255,0.03);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .q-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.55;
    color: var(--text);
  }

  /* Level colours */
  .level-1 { border-color: var(--c1); }
  .level-1 .q-label { color: var(--c1); }

  .level-2 { border-color: var(--c2); }
  .level-2 .q-label { color: var(--c2); }

  .level-3 { border-color: var(--c3); }
  .level-3 .q-label { color: var(--c3); }

  .level-4 { border-color: var(--c4); }
  .level-4 .q-label { color: var(--c4); }

  .level-5 { border-color: var(--c5); }
  .level-5 .q-label { color: var(--c5); }

  .level-6 { border-color: var(--c6); }
  .level-6 .q-label { color: var(--c6); }

  .topic-heading {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .regenerate-btn {
    margin-top: 8px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-start;
  }

  .regenerate-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
</style>
</head>
<body>

<header>
  <h1>💡 Question Generator</h1>
  <p>Bloom's Taxonomy questions for Grade 6 — from simple recall to creative thinking</p>
</header>

<div class="card">
  <div class="input-row">
    <input type="text" id="topicInput" placeholder="e.g. water, friendship, the rainforest..." onkeydown="if(event.key==='Enter') generate()" />
    <button id="generateBtn" onclick="generate()">Generate</button>
  </div>
  <div class="status" id="status"></div>

  <div class="questions-list" id="questionsList">
    <div class="topic-heading" id="topicHeading"></div>
    <div id="questionsContainer"></div>
    <button class="regenerate-btn" onclick="generate()">↺ Generate new questions</button>
  </div>
</div>

<script>
  const levels = [
    { name: "Remember", num: 1 },
    { name: "Understand", num: 2 },
    { name: "Apply", num: 3 },
    { name: "Analyse", num: 4 },
    { name: "Evaluate", num: 5 },
    { name: "Create", num: 6 },
  ];

  async function generate() {
    const topic = document.getElementById("topicInput").value.trim();
    if (!topic) return;

    const btn = document.getElementById("generateBtn");
    const status = document.getElementById("status");
    const list = document.getElementById("questionsList");

    btn.disabled = true;
    list.classList.remove("visible");
    status.textContent = "⏳ Generating questions about \"" + topic + "\"...";

    const prompt = `You are an EFL teacher creating discussion questions for Grade 6 students (age 12, B1 English level) about the topic: "${topic}"

Generate exactly one question for each of the 6 levels of Bloom's Taxonomy. 
The language must be simple, clear, and appropriate for 12-year-old EFL learners.
Each question should clearly reflect its Bloom's level.

Respond ONLY in this exact JSON format with no extra text or markdown:

{
  "topic": "${topic}",
  "questions": [
    { "level": "Remember", "question": "..." },
    { "level": "Understand", "question": "..." },
    { "level": "Apply", "question": "..." },
    { "level": "Analyse", "question": "..." },
    { "level": "Evaluate", "question": "..." },
    { "level": "Create", "question": "..." }
  ]
}`;

    try {
      const res = await fetch("https://claude-proxy.paulbolter.workers.dev/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 800,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content[0].text.trim();
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      document.getElementById("topicHeading").textContent = "Topic: " + parsed.topic;

      const container = document.getElementById("questionsContainer");
      container.innerHTML = "";

      parsed.questions.forEach((q, i) => {
        const div = document.createElement("div");
        div.className = "q-item level-" + (i + 1);
        div.innerHTML = `
          <div class="q-label">${i + 1}. ${q.level}</div>
          <div class="q-text">${q.question}</div>
        `;
        container.appendChild(div);
      });

      list.classList.add("visible");
      status.textContent = "";

    } catch (err) {
      status.textContent = "❌ Error: " + err.message;
    }

    btn.disabled = false;
  }
</script>

</body>
</html>
