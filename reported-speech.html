<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reported Speech</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #eef2f7;
    min-height: 100vh;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.95rem;
    color: #777;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    border: 1px solid #dde3ee;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 10px;
  }

  .btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .reporter-btn {
    padding: 9px 20px;
    border-radius: 10px;
    border: 1.5px solid #ddd;
    background: #fff;
    color: #555;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .reporter-btn:hover { border-color: #aaa; color: #222; }

  .reporter-btn.active {
    background: #185fa5;
    border-color: #185fa5;
    color: #fff;
  }

  .name-input {
    padding: 8px 14px;
    font-size: 14px;
    border-radius: 10px;
    border: 1.5px solid #ddd;
    background: #fff;
    color: #1a1a1a;
    width: 170px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  .name-input:focus { border-color: #185fa5; }
  .name-input::placeholder { color: #bbb; }

  textarea {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border-radius: 10px;
    border: 1.5px solid #ddd;
    background: #fafafa;
    color: #1a1a1a;
    resize: vertical;
    font-family: inherit;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: #185fa5; background: #fff; }
  textarea::placeholder { color: #bbb; }

  .transform-btn {
    width: 100%;
    padding: 13px;
    background: #185fa5;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
    margin-top: 1rem;
  }

  .transform-btn:hover { opacity: 0.88; }
  .transform-btn:active { transform: scale(0.99); }
  .transform-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .results-area { margin-top: 1.5rem; }

  .results-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .result-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid #dde3ee;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: 0.03em;
    background: #e6f1fb;
    color: #185fa5;
  }

  .result-original {
    font-size: 13px;
    color: #999;
    margin-bottom: 6px;
    font-style: italic;
  }

  .result-transformed {
    font-size: 15px;
    color: #1a1a1a;
    font-weight: 500;
    line-height: 1.5;
  }

  .loading-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid #dde3ee;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ccc;
    animation: blink 1.1s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%,100% { opacity: 0.25; }
    50% { opacity: 1; }
  }

  .error-msg {
    font-size: 13px;
    color: #c0392b;
  }

  .clear-btn {
    display: block;
    margin: 0.5rem auto 0;
    background: none;
    border: none;
    color: #bbb;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
  }
  .clear-btn:hover { color: #888; }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>Reported Speech</h1>
    <p>Write a sentence — see it in reported speech!</p>
  </header>

  <!-- Reporter selection -->
  <div class="card">
    <div class="section-label">Who is speaking?</div>
    <div class="btn-group">
      <button class="reporter-btn active" id="btn-he"   onclick="setReporter('He')">He</button>
      <button class="reporter-btn"        id="btn-she"  onclick="setReporter('She')">She</button>
      <button class="reporter-btn"        id="btn-they" onclick="setReporter('They')">They</button>
      <input class="name-input" type="text" id="custom-name" placeholder="Or type a name…" oninput="setCustomName(this.value)" />
    </div>
  </div>

  <!-- Sentence input -->
  <div class="card">
    <div class="section-label">Your sentence</div>
    <textarea id="sentence-input" rows="3" placeholder='e.g. "I love pizza."'></textarea>
    <button class="transform-btn" id="go-btn" onclick="transform()">Convert to reported speech →</button>
  </div>

  <!-- Results -->
  <div class="results-area" id="results-area" style="display:none;">
    <div class="results-label">Results</div>
    <div id="results"></div>
    <button class="clear-btn" onclick="clearResults()">Clear all</button>
  </div>

</div>

<script>
const PROXY = 'https://claude-proxy.paulbolter.workers.dev/';

let reporter = 'He';
let customName = '';
let isLoading = false;

function setReporter(r) {
  reporter = r;
  customName = '';
  document.getElementById('custom-name').value = '';
  ['he','she','they'].forEach(id => {
    document.getElementById('btn-' + id).classList.toggle('active', r.toLowerCase() === id);
  });
}

function setCustomName(val) {
  customName = val.trim();
  if (customName) {
    reporter = customName;
    ['he','she','they'].forEach(id => document.getElementById('btn-' + id).classList.remove('active'));
  } else {
    setReporter('He');
  }
}

async function transform() {
  const sentence = document.getElementById('sentence-input').value.trim();
  if (!sentence || isLoading) return;

  isLoading = true;
  const btn = document.getElementById('go-btn');
  btn.disabled = true;
  btn.textContent = 'Converting…';

  const reporterName = customName || reporter;
  const prompt = `Convert this sentence to reported speech using "${reporterName}" as the subject (e.g. "${reporterName} said that..."). Return ONLY the transformed sentence, nothing else.\n\nSentence: ${sentence}`;

  const resultsDiv = document.getElementById('results');
  document.getElementById('results-area').style.display = 'block';

  const loader = document.createElement('div');
  loader.className = 'loading-card';
  loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  resultsDiv.insertBefore(loader, resultsDiv.firstChild);

  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 200,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const transformed = data.content[0].text.trim();

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <span class="result-tag">Reported speech · ${reporterName}</span>
      <div class="result-original">"${sentence}"</div>
      <div class="result-transformed">${transformed}</div>`;
    loader.replaceWith(card);

  } catch(e) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = '<div class="error-msg">Something went wrong — please try again.</div>';
    loader.replaceWith(card);
  }

  isLoading = false;
  btn.disabled = false;
  btn.textContent = 'Convert to reported speech →';
  document.getElementById('sentence-input').value = '';
  document.getElementById('sentence-input').focus();
}

function clearResults() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('results-area').style.display = 'none';
}

document.getElementById('sentence-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); transform(); }
});
</script>

</body>
</html>
