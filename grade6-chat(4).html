<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 6 Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --primary: #5b6cf9;
    --primary-dark: #4455e8;
    --accent: #ff7eb3;
    --teacher: #ffb830;
    --teacher-dark: #e09800;
    --text: #2d3154;
    --text-light: #7b82b0;
    --border: #dde2ff;
    --bubble-student: #eef0ff;
    --bubble-teacher: #fff8e6;
    --shadow: 0 4px 20px rgba(91,108,249,0.10);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  header {
    width: 100%;
    background: var(--primary);
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 16px rgba(91,108,249,0.25);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-icon {
    font-size: 2rem;
    line-height: 1;
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem;
    color: #fff;
    letter-spacing: 0.5px;
  }

  header h1 span {
    color: #ffd6ea;
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    display: block;
    line-height: 1;
  }

  #teacher-btn {
    background: var(--teacher);
    color: #7a4a00;
    border: none;
    border-radius: 30px;
    padding: 8px 18px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  #teacher-btn:hover { background: var(--teacher-dark); color: #fff; transform: translateY(-1px); }
  #teacher-btn.active { background: #e05555; color: #fff; }

  /* MAIN LAYOUT */
  main {
    width: 100%;
    max-width: 680px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 16px 0;
    gap: 0;
  }

  /* STATUS BAR */
  #status-bar {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-light);
    margin-bottom: 12px;
    min-height: 18px;
  }

  /* MESSAGES FEED */
  #messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 16px;
    min-height: 300px;
    max-height: calc(100vh - 320px);
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: popIn 0.25s cubic-bezier(.4,1.6,.6,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 0 6px;
  }

  .msg-name {
    font-weight: 800;
    font-size: 0.82rem;
    color: var(--primary-dark);
  }

  .msg-name.teacher-name {
    color: var(--teacher-dark);
  }

  .msg-time {
    font-size: 0.72rem;
    color: var(--text-light);
  }

  .msg-bubble {
    background: var(--bubble-student);
    border-radius: 4px 18px 18px 18px;
    padding: 10px 16px;
    font-size: 0.97rem;
    line-height: 1.5;
    color: var(--text);
    max-width: 100%;
    word-break: break-word;
    box-shadow: 0 2px 8px rgba(91,108,249,0.07);
  }

  .msg-bubble.teacher-bubble {
    background: var(--bubble-teacher);
    border-radius: 4px 18px 18px 18px;
    border-left: 4px solid var(--teacher);
    box-shadow: 0 2px 8px rgba(255,184,48,0.12);
  }

  .teacher-badge {
    display: inline-block;
    background: var(--teacher);
    color: #7a4a00;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 1px 8px;
    border-radius: 20px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }

  /* Links in messages */
  .msg-bubble a {
    color: var(--primary);
    text-decoration: underline;
    word-break: break-all;
  }

  /* Empty state */
  #empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-light);
  }
  #empty-state .empty-emoji { font-size: 3rem; margin-bottom: 12px; }
  #empty-state p { font-size: 1rem; font-weight: 600; }
  #empty-state small { font-size: 0.85rem; }

  /* Loading state */
  #loading-state {
    text-align: center;
    padding: 40px;
    color: var(--text-light);
    font-weight: 600;
  }

  /* INPUT AREA */
  #input-area {
    background: var(--surface);
    border-top: 2px solid var(--border);
    padding: 14px 0 18px;
    position: sticky;
    bottom: 0;
    width: 100%;
    max-width: 680px;
  }

  #name-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  #name-input {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border 0.2s;
  }
  #name-input:focus { border-color: var(--primary); }

  #message-row {
    display: flex;
    gap: 8px;
  }

  #message-input {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border 0.2s;
    resize: none;
    min-height: 44px;
    max-height: 120px;
  }
  #message-input:focus { border-color: var(--primary); }

  #send-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    width: 48px;
    height: 48px;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }
  #send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
  #send-btn:disabled { background: #c0c6f0; cursor: not-allowed; transform: none; }

  /* TEACHER MODE INDICATOR */
  #teacher-mode-bar {
    display: none;
    background: linear-gradient(90deg, #fff8e6, #fff3d0);
    border: 2px solid var(--teacher);
    border-radius: 12px;
    padding: 8px 14px;
    margin-bottom: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--teacher-dark);
    align-items: center;
    gap: 8px;
  }
  #teacher-mode-bar.visible { display: flex; }

  /* PASSWORD MODAL */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(45,49,84,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  #modal-overlay.visible { display: flex; }

  #modal {
    background: var(--surface);
    border-radius: 24px;
    padding: 32px 28px 24px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(45,49,84,0.25);
    text-align: center;
    animation: modalIn 0.25s cubic-bezier(.4,1.4,.6,1) both;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: none; }
  }

  #modal h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    color: var(--primary);
    margin-bottom: 6px;
  }
  #modal p { font-size: 0.88rem; color: var(--text-light); margin-bottom: 18px; }

  #pw-input {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 3px;
    transition: border 0.2s;
  }
  #pw-input:focus { border-color: var(--primary); }

  #pw-error {
    color: #e05555;
    font-size: 0.82rem;
    font-weight: 700;
    min-height: 18px;
    margin-bottom: 10px;
  }

  #modal-btns { display: flex; gap: 10px; }

  .modal-btn {
    flex: 1;
    padding: 11px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-btn:hover { opacity: 0.85; }
  #modal-cancel { background: var(--bg); color: var(--text-light); }
  #modal-confirm { background: var(--primary); color: #fff; }

  /* SCROLL TO BOTTOM BTN */
  #scroll-btn {
    display: none;
    position: fixed;
    bottom: 140px;
    right: 24px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  #scroll-btn.visible { display: flex; }

  /* CONFIG NOTICE */
  #config-notice {
    background: #fff3cd;
    border: 2px solid #ffc107;
    border-radius: 12px;
    padding: 16px;
    margin: 16px 0;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #664d03;
  }
  #config-notice strong { display: block; margin-bottom: 4px; font-size: 1rem; }

  @media (max-width: 480px) {
    header h1 { font-size: 1.3rem; }
    main { padding: 12px 10px 0; }
    #messages { max-height: calc(100vh - 300px); }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="chat-icon">💬</div>
    <h1>Grade 6 Chat <span>Presidential School · Jizzakh</span></h1>
  </div>
  <button id="teacher-btn" onclick="handleTeacherBtn()">👨‍🏫 Teacher</button>
</header>

<main>
  <div id="status-bar">Connecting...</div>

  <div id="messages">
    <div id="loading-state">Loading messages... ⏳</div>
  </div>

  <div id="input-area">
    <div id="teacher-mode-bar">
      ⭐ Teacher mode active — your messages will show a Teacher badge
    </div>
    <div id="name-row">
      <input type="text" id="name-input" placeholder="Your name" maxlength="30" />
    </div>
    <div id="message-row">
      <textarea id="message-input" placeholder="Type a message..." rows="1" maxlength="500"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
  </div>
</main>

<button id="scroll-btn" onclick="scrollToBottom()" title="Scroll to bottom">↓</button>

<!-- Password Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>🔐 Teacher Login</h2>
    <p>Enter the teacher password to post as Teacher</p>
    <input type="password" id="pw-input" placeholder="••••••" onkeydown="if(event.key==='Enter')confirmPassword()" />
    <div id="pw-error"></div>
    <div id="modal-btns">
      <button class="modal-btn" id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn" id="modal-confirm" onclick="confirmPassword()">Login</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURATION — REPLACE THIS URL AFTER SETTING UP YOUR
// GOOGLE APPS SCRIPT (see setup instructions below)
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzACcTBUpnaTKzDxjKNDkzViOT6VijTXvdeLhOvYQT0zOZ7xTIObBJ_PnywS2DAa5mKw/exec';
// ============================================================

const TEACHER_PASSWORD = 'parrot';
const REFRESH_INTERVAL = 5000; // refresh every 5 seconds

let isTeacher = false;
let lastMessageCount = 0;
let refreshTimer = null;
let isAtBottom = true;

// Save name across page loads
const savedName = localStorage.getItem('grade6chat_name') || '';
document.getElementById('name-input').value = savedName;
document.getElementById('name-input').addEventListener('input', e => {
  localStorage.setItem('grade6chat_name', e.target.value.trim());
});

// Auto-resize textarea
const msgInput = document.getElementById('message-input');
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Scroll tracking
document.getElementById('messages').addEventListener('scroll', function() {
  const el = this;
  isAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  document.getElementById('scroll-btn').classList.toggle('visible', !isAtBottom);
});

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ============================================================
// TEACHER MODE
// ============================================================
function handleTeacherBtn() {
  if (isTeacher) {
    // Log out
    isTeacher = false;
    document.getElementById('teacher-btn').textContent = '👨‍🏫 Teacher';
    document.getElementById('teacher-btn').classList.remove('active');
    document.getElementById('teacher-mode-bar').classList.remove('visible');
    document.getElementById('name-input').value = localStorage.getItem('grade6chat_name') || '';
    document.getElementById('name-input').disabled = false;
  } else {
    openModal();
  }
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

function confirmPassword() {
  const pw = document.getElementById('pw-input').value;
  if (pw === TEACHER_PASSWORD) {
    isTeacher = true;
    document.getElementById('teacher-btn').textContent = '✅ Teacher (logout)';
    document.getElementById('teacher-btn').classList.add('active');
    document.getElementById('teacher-mode-bar').classList.add('visible');
    document.getElementById('name-input').value = 'Mr Paul';
    document.getElementById('name-input').disabled = true;
    closeModal();
  } else {
    document.getElementById('pw-error').textContent = '❌ Wrong password, try again';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

// Click outside modal to close
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// MESSAGES
// ============================================================
function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  if (isToday) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { day: 'numeric', month: 'short' }) + ' ' +
         d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function linkify(text) {
  // Convert URLs to clickable links, escape HTML first
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>'
  );
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  const wasAtBottom = isAtBottom;

  if (messages.length === 0) {
    container.innerHTML = `
      <div id="empty-state">
        <div class="empty-emoji">👋</div>
        <p>No messages yet!</p>
        <small>Be the first to say something.</small>
      </div>`;
    return;
  }

  // Only re-render if count changed
  if (messages.length === lastMessageCount) return;
  lastMessageCount = messages.length;

  container.innerHTML = messages.map(msg => {
    const isT = msg.isTeacher === 'TRUE' || msg.isTeacher === true;
    return `
      <div class="message">
        <div class="msg-meta">
          <span class="msg-name ${isT ? 'teacher-name' : ''}">${escapeHtml(msg.name)}${isT ? '<span class="teacher-badge">TEACHER</span>' : ''}</span>
          <span class="msg-time">${formatTime(msg.timestamp)}</span>
        </div>
        <div class="msg-bubble ${isT ? 'teacher-bubble' : ''}">${linkify(msg.message)}</div>
      </div>`;
  }).join('');

  if (wasAtBottom) scrollToBottom();
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
// API CALLS
// ============================================================
function showConfigNotice() {
  document.getElementById('messages').innerHTML = `
    <div id="config-notice">
      <strong>⚙️ Setup needed!</strong>
      This chat needs a Google Apps Script URL to work.<br>
      Follow the setup instructions to connect it to your Google Sheet,
      then replace <code>YOUR_APPS_SCRIPT_URL_HERE</code> in the HTML file.
    </div>`;
  document.getElementById('status-bar').textContent = 'Not connected — see setup instructions';
}

async function fetchMessages() {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showConfigNotice();
    return;
  }
  try {
    const res = await fetch(SCRIPT_URL + '?action=get');
    const data = await res.json();
    renderMessages(data.messages || []);
    document.getElementById('status-bar').textContent =
      `${(data.messages || []).length} messages · refreshes every 5s`;
  } catch (e) {
    document.getElementById('status-bar').textContent = 'Could not load messages — check connection';
  }
}

async function sendMessage() {
  const nameEl = document.getElementById('name-input');
  const msgEl = document.getElementById('message-input');
  const name = nameEl.value.trim();
  const message = msgEl.value.trim();

  if (!name) { nameEl.focus(); nameEl.style.borderColor = '#e05555'; return; }
  nameEl.style.borderColor = '';
  if (!message) { msgEl.focus(); return; }

  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showConfigNotice();
    return;
  }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '⏳';

  try {
    // Use GET with URL params to avoid CORS issues with Google Apps Script
    const params = new URLSearchParams({
      action: 'post',
      name: isTeacher ? 'Mr Paul' : name,
      message: message,
      isTeacher: isTeacher ? 'TRUE' : 'FALSE'
    });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    const data = await res.json();
    if (data.success) {
      msgEl.value = '';
      msgEl.style.height = 'auto';
      lastMessageCount = 0;
      await fetchMessages();
      scrollToBottom();
    }
  } catch (e) {
    alert('Could not send message. Check your internet connection.');
  }

  btn.disabled = false;
  btn.textContent = '➤';
}

// ============================================================
// INIT
// ============================================================
fetchMessages();
refreshTimer = setInterval(fetchMessages, REFRESH_INTERVAL);
</script>

</body>
</html>
